# -----------------------------------------------------------------------------
# Форма работы (SKILL.md Step 0). Наследует роль оси профилей ставок (v3–v9),
# упразднённой ADR-0002 (docs/adr/0002-pocock-spine-unconditional.md) и
# разрешённой спекой #4 (issue #4): цена — легитимный аргумент только на слое
# Исполнителя, глубину проверки ценой больше не масштабируем — гейт фиксируется
# тремя линзами безусловно (config gates:, срез 3 — issue #7, здесь не тронут).
# shape: решает не ГЛУБИНУ проверки, а ПОСЛЕДОВАТЕЛЬНОСТЬ шагов: нужны ли спека
# и нарезка на тикеты перед фронтиром, или работа идёт сразу в разбирательство.
# Критерий развилки — разваливается ли работа на вертикальные срезы, а не
# важность, риск или размер в строках; размер задачи (таблица триажа Step 0)
# отдельно управляет ШИРИНОЙ веера, как и раньше. Профиль low не существует:
# критерий входа ADR-0002 («я не отдам простую задачу в оркестратор; если я
# отдаю задачу — значит там есть над чем подумать», владелец, 2026-07-15;
# орфография и пунктуация нормализованы) исключает класс задач, который low
# описывал, — тривиальное сюда не приезжает по построению.
# -----------------------------------------------------------------------------
shape:
  values:
    сборка:                  # assembly — работа разваливается на вертикальные срезы
      criterion: work splits into vertical slices (spec, then tickets with blocking edges)
      sequence: grill (lead-opened, owner-answered) -> spec (to-spec) -> tickets (to-tickets) -> frontier
    разбирательство:         # investigation — одна нитка, резать нечего
      criterion: one thread, nothing to cut into slices
      sequence: straight to work; no spec, no tickets; Step 0.5 clarification rules apply unchanged

# -----------------------------------------------------------------------------
# Маршрутизация: класс подзадачи -> агент (SKILL.md Step 2).
# Классифицируй КАЖДУЮ подзадачу до маршрутизации; достаточно одного сигнала.
# -----------------------------------------------------------------------------
routing:
  # При сомнении между двумя классами — маршрутизируй ВВЕРХ: up-route стоит
  # немного квоты, down-route даёт уверенную тихую ошибку (дороже в итоге).
  tie_break: up

  classes:
    judgment:                    # -> architect (Fable) или critic (Opus), никогда ниже
      route: [architect, critic]
      signals:
        - open design space
        - ambiguity left to resolve
        - security implications
        - unknown root cause
        - conflicting constraints to weigh
        - quality assessment of meaning (audits/reviews of prose, design, policy, architecture)
        - an error would silently mislead the lead
    skilled:                     # -> builder (Sonnet)
      route: [builder]
      signals:
        - complete spec exists
        - success is objectively checkable (tests, criteria)
        - known patterns apply
        - bounded blast radius
    mechanical:                  # -> scout (Haiku); только read-only, без суждений
      route: [scout]
      signals:
        - every step enumerable in advance
        - zero decisions remain
        - exact output format given
        - a wrong result is detectable on sight
      # v23: ПЕРЕКАЛИБРОВКА. Ключ large_inventory_route_up_from: 32 (v13) СНЯТ —
      # он мерил не ту величину. v13 стоял на одной точке (scout t3 = 38 элементов:
      # haiku 0.868, luna 0.921 при планке 0.95; t1=25/t2=17 — 1.0) и сам просил
      # перекалибровки по телеметрии. Точка пришла: recon t3, ключ 450 элементов —
      # haiku precision 1.0 / recall 1.0, идеально (прогон 2026-07-19-recon-kimi,
      # там же kimi 1.0/1.0 — задача не различила даже 1M-контекст).
      # 450 взяты чисто там, где 38 провалены => дело НЕ в размере. Различает СПОСОБ:
      #   - провал t3=38 — обход файлов с накоплением счёта ПО ХОДУ чтения;
      #   - успех 450    — один поиск, ответ собран ИЗ РЕЗУЛЬТАТОВ поиска.
      # Дешёвые тиры не держат состояние в голове по ходу обхода; переписывать и
      # классифицировать выдачу поиска они умеют без потерь на любом объёме.
      inventory_method:
        # Дешёвый тир (scout/gemini-recon-cheap) БЕЗ ограничения размера, если тикет
        # написан так, что элементы даёт поиск, а исполнитель их переносит:
        cheap_tier_ok: search-then-collect
        # На тир выше (sonnet / codex-code / grok-build) — только этот случай:
        route_up: walk-and-count      # элементы одним поиском не добываются, нужно
                                      # идти по файлам и накапливать состояние
        # ГЛАВНОЕ следствие, и оно про ЛИДА, а не про исполнителя: в каком из двух
        # режимов окажется тикет, решает ТОТ, КТО ЕГО ПИШЕТ. Прежде чем повышать
        # тир, переписать тикет в форму search-then-collect (задать шаблоны и пути
        # явно — этого и требуют правила scout, agents/scout.md §1). Повышение тира —
        # для случаев, когда так переписать НЕЛЬЗЯ, а не первая реакция на объём.
        prefer: rewrite-ticket-before-routing-up

  # Жёсткие полы: никогда не ниже Opus, независимо от квоты.
  hard_floors:
    - architecture and technology decisions
    - risky-change planning
    - root-cause debugging
    - security-relevant work
    - final verification of production code
    - judgment-bearing review/audit lenses

  escalation:
    # Лестница на FAIL: ① ретрай тем же агентом с находками критика ->
    # ② тир вверх (свежий контекст) -> ③ блокер-отчёт пользователю.
    ladder: [retry-same-agent, escalate-tier, report-blocker]
    # v7 (гайд команды Claude Code, 2026-07-07): перед тратой ступени ① —
    # диагноз провала. «Не старался» (пропустил файл, не прогнал тесты,
    # бросил на полпути) -> ретрай тем же тиром; если effort воркера был
    # пинован ниже дефолта — поднять. «Не знал» (полный контекст, честная
    # попытка, уверенно неправ) -> ступень ① пропускается, сразу тир вверх:
    # ретрай того же тира на capability-провале — потерянная попытка по
    # построению. Экономика той же статьи подтверждает tie_break: up —
    # на действительно трудной задаче старшая модель достигает планки за
    # меньшее число шагов и выходит ДЕШЕВЛЕ за задачу, несмотря на цену токена.
    failure_diagnosis: effort-vs-capability
    max_attempts_per_subtask: 2    # третий провал = блокер-отчёт, не ретрай
    tiers: [haiku, sonnet, opus, fable]
    one_way: true                  # упавшая наверх подзадача вниз не возвращается

  overrides:
    # model-параметр Agent-вызова поверх фронтматтера: вверх — всегда можно.
    up_routing: always-allowed
    # Потолок up-routing — model: fable; ровно два санкционированных применения
    # (v11: третье — «correctness lens of a highest-stakes dual-lens» — снято
    # вместе с упразднённым механизмом двойной линзы; ADR-0002, срез 3 — issue #7).
    fable_ceiling_uses:
      - architect (bound by design)
      - final escalation rung
    # Даунгрейд critic до sonnet — только при ВСЕХ трёх условиях сразу.
    critic_downgrade_requires_all:
      - deliverable is recon or an intermediate draft (not production code, not acted on directly)
      - deterministic checks exist and already passed
      - a missed defect is still caught downstream before the user relies on the result

# -----------------------------------------------------------------------------
# Веера и рабочее дерево (SKILL.md Step 3).
# -----------------------------------------------------------------------------
fan_out:
  healthy_default: [3, 5]          # типичный здоровый параллелизм
  workflow_preferred_from: 5       # >= N однотипных элементов -> Workflow-пайплайн
  # v16 (эпизод на маке 2026-07-17, волна Т3/#137): два писателя штатно делили одно
  # дерево (порог был 3) — дисциплина снапшотов защитила атрибуцию диффов, но НЕ
  # среду исполнения: тестовый прогон одного воркера видел незакоммиченные файлы
  # соседа («их тесты тоже зелёные в общем прогоне»). Повезло, что сосед был зелёным;
  # красный сосед дал бы ложный вердикт детерминированного гейта — гонка, которую
  # ревью пост-фактум не ловит. Порог 3 был экономией времён дорогого worktree;
  # цена создания worktree сегодня копеечная, герметичность гейтов дороже.
  worktree_isolation_from_writers: 2   # >= N параллельных писателей -> worktree обязателен
  # v6 (разбор Orca orchestration, 2026-07-12): стражник свежести базы перед
  # диспетчем writer-волны — если чекаут/worktree отстал от базовой ветки
  # больше чем на N коммитов, сначала обнови базу (fetch + rebase или
  # пересоздание worktree), потом диспетчь. Переопределение — только явным
  # решением лида с причиной в телеметрии, никогда молча. Порог взят из
  # калибровки Orca: пропускает дневную скорость активного монорепо, ловит
  # чекаут, уехавший на сотни коммитов.
  stale_base_max_behind: 20

# -----------------------------------------------------------------------------
# Гейты качества (SKILL.md Step 4, quality.md).
# -----------------------------------------------------------------------------
gates:
  # Фиксированный гейт трёх линз (ADR-0002, спека #4, срез 3 — issue #7). Любой
  # принимаемый деливерабл проходит ОДНУ волну из трёх параллельных штатных линз —
  # не масштабируемых ни ценой, ни профилем, и без opt-in состава: dual_lens_triggers,
  # dual_lens_correctness_model и cross_model_third_lens (v3–v10 — двойная линза
  # высших ставок + opt-in кросс-модельная третья) упразднены вместе со всем
  # механизмом, который они переключали. Три линзы и их постоянный вопрос —
  # CONTEXT.md, термин «Линза»:
  #   Standards — хорошо ли сделано (документированные стандарты репо + двенадцать
  #     запахов Фаулера, гл. 3); чужой исполнитель против self-preference bias.
  #   Spec — то ли сделано и нет ли лишнего (сверка со спекой/тикетом, включая его
  #     Out of Scope — scope creep); поглощает прежнюю линзу полноты.
  #   критик — можно ли верить (перезапуск тестов, попытка опровергнуть); единственная
  #     линза с вердиктом PASS/FAIL — verdict: true у неё одной.
  # Правила адъюдикации находок (scope, blocking_scope, дельта-переверификация) не
  # входят в состав линз — они в review_loop ниже и не менялись с v8.
  #
  # executor: поле значит РАЗНОЕ у трёх линз — не единое понятие (находка гейта
  # среза 3, Sol, «Mysterious Name»). standards -> имя ЛЕЙНА из cross_provider.lanes
  # (модель/эффорт пинуются там, здесь только имя лейна). critic -> имя АГЕНТА:
  # у линзы есть свой agents/critic.md, и правило шапки этого файла №4 запрещает
  # дублировать здесь его model/effort — источник истины строго фронтматтер.
  # spec -> прямой пин МОДЕЛИ: у линзы нет собственного agents/*.md, конфиг —
  # законное (и единственное) место, где её исполнитель вообще пинуется.
  # v27 (срез 2, ADR-0005, раздел «Шов»): non_agentic_lane_delivery / _never /
  # requires_pregate_output_inline ниже — свойство ОСИ (кто судит), не лейна.
  # Раньше жили на лейне gemini-critic (delivery: inline-material, never:
  # [live-tool-run, self-walk-the-tree], requires_pregate_output_inline: true) и
  # терялись бы при слиянии gemini-* лейнов в gemini-flash. Правило: КОГДА
  # исполнитель линзы — кросс-провайдерный лейн без собственного обхода дерева
  # (сейчас единственный такой — gemini-flash), лид кладёт деливерабл (и для
  # critic — ещё и вывод детерминированного прегейта) в промпт; лейн живые
  # инструменты не запускает и дерево не обходит. Агентные исполнители (Claude,
  # codex-cli, grok-cli, kimi-cli — у всех свой обход/shell) этим не связаны.
  lenses:
    standards:
      question: is it well made — repo's documented coding standards + Fowler's twelve smells (ch. 3)
      # v23 (решение владельца 2026-07-21): жёсткий пин codex-critic заменён равным
      # пулом (Sol / Grok / Kimi) — как уже сделано у architect, critic, builder,
      # spec-lens. Исполнитель разрешается через цепочку; второго исполняемого пина
      # здесь СОЗНАТЕЛЬНО нет. Доставка базы запахов в промпт — срез 4, не здесь.
      executor: availability.fallbacks.standards-lens
      non_agentic_lane_delivery: inline-material
      non_agentic_lane_never: [live-tool-run, self-walk-the-tree]
    spec:
      question: is it the right thing, and nothing extra — matches the spec/ticket, including its Out of Scope (scope creep); absorbs the former completeness lens
      # v23 (решение владельца 2026-07-21): жёсткий пин `opus` заменён РАВНЫМ ПУЛОМ
      # из пяти — тот же принцип, что уже действует у architect и critic. Прежний
      # одиночный пин был последней судейской ролью, где выбор не мог разойтись с
      # вендором продюсера (см. independence_filter ниже, туда добавлена spec).
      # Исполнитель разрешается через availability.fallbacks.spec-lens — второго
      # исполняемого пина здесь СОЗНАТЕЛЬНО нет: разошлись бы.
      executor: availability.fallbacks.spec-lens
      non_agentic_lane_delivery: inline-material
      non_agentic_lane_never: [live-tool-run, self-walk-the-tree]
    critic:                      # глоссарий CONTEXT.md называет линзу «критик»; ключ —
                                 # английский, как и везде в этом файле (routing.classes,
                                 # availability.fallbacks.critic) — тот же исполнитель.
      question: can it be trusted — re-runs tests, tries to refute the deliverable, PASS/FAIL verdict
      executor: critic            # агент; модель — во фронтматтере agents/critic.md
      non_agentic_lane_delivery: inline-material
      non_agentic_lane_never: [live-tool-run, self-walk-the-tree]
      # критик несёт вердикт гейта (verdict: true) -> для неагентного лейна на этой
      # роли (routing.classes.judgment критик-воркер, availability.fallbacks.critic)
      # вложенный вывод детерминированного прегейта ОБЯЗАТЕЛЕН — без него линза не
      # исполнена. Было lanes.gemini-critic.requires_pregate_output_inline.
      requires_pregate_output_inline: for-non-agentic-lanes
      verdict: true              # единственная линза, дающая вердикт гейта
  # v2.11: для UI-деливераблов живой прогон основного сценария — в детерминированном
  # гейте (реальные обработчики событий, не только зелёная сборка).
  ui_live_check: required
  # v2.11: негативная проба обязана удостоверять, КТО ответил (тело/заголовок),
  # а не только код статуса.
  probe_responder_identity: required
  # Ревью всего интегрированного диффа после волны из >= N писателей.
  whole_diff_review_from_writers: 2

  # v15 (2026-07-17, чужой инцидент как сигнал §8: ночной omp-прогон соседнего проекта —
  # тикет с планом 2–4k строк разросся до ~43k незакоммиченных строк; разбор показал
  # петлю «ревьюер вознаграждается за найденный пробел -> автор дописывает» без чьего-либо
  # права сказать «достаточно»). Наш детерминированный прегейт уже ограничивает дифф
  # ПО ПУТЯМ (quality.md §4: дифф только в названных тикетом файлах); этот блок добавляет
  # ограничение ПО ОБЪЁМУ — ноль LLM-токенов, срабатывает до критика. Объём для модели
  # бесплатен, поэтому объём — не сигнал усилия, а сигнал тревоги.
  pre_gate:
    # Потолок строк диффа на тикет: insertions + deletions по git diff --numstat против
    # пофайлового снапшота тикета (SKILL.md «Working-tree discipline»). Превышение —
    # детерминированный FAIL: возврат продюсеру с требованием нарезать по-трассирующему,
    # не вход в критика. Начальная догадка — правь по данным (§5): типичный трассирующий
    # тикет на порядок меньше потолка.
    max_diff_lines: 1200
    # Переопределение — ТОЛЬКО заранее: тикет сам объявляет ожидаемый объём в ACCEPTANCE
    # (законные случаи: wide-refactor батч, сгенерированный артефакт), лид фиксирует
    # именованное решение с причиной в телеметрии — тот же паттерн, что у
    # review_loop.proportionality_stop и fan_out.stale_base_max_behind. Пост-фактум
    # поднимать потолок под уже раздутый дифф запрещено: это ровно та лазейка,
    # которую потолок закрывает.
    override: ticket-declared-only

  # v8 (кейс a real project #21, 2026-07-12): контур ревью. Два корня: критик без семантики
  # документированных решений честно пере-судит закрытые вопросы (major-блокер на
  # задокументированном трейд-оффе + системном паттерне соседнего маршрута), а полные
  # раунды после каждой правки не сходятся — свежий контекст с установкой на recall
  # всегда находит новое. Метод и определения — quality.md §3a/§3b; промпт — agents/critic.md.
  review_loop:
    # Пакет контекста решений: индекс ADR + совпавшие термины CONTEXT.md + inline-маркеры
    # решений у затронутого кода, с провенансом base|added-by-diff. Собирается МЕХАНИЧЕСКИ
    # (scout по правилу включения из quality.md §3a; шелл не нужен — дифф-снапшот тикета и
    # затронутые файлы читаются Grep/Read). Продюсер пакет не собирает и не фильтрует
    # НИКОГДА (канал занижения строгости); лид может только ДОБАВЛЯТЬ записи.
    decision_context_pack: required-for-code   # каждый critic-гейт над кодом целевого репо
    pack_max_lines: 40                         # ссылки + однострочные цитаты, не транскрипты (принцип v5)
    # Ось скоупа находки — живёт в находках и note; словарь вердиктов телеметрии (§7)
    # НЕ трогается. Пропущенный scope читается как introduced (обратная совместимость).
    finding_scopes: [introduced, pre-existing, decision-challenge]
    blocking_scope: introduced                 # FAIL дают только introduced critical/major
                                               # (или проваленный критерий приёмки)
    # Экономика раундов: полный раунд = одна волна над деливераблом (все три линзы
    # параллельно = ОДИН раунд); дельта-переверификация принятых правок раундом не
    # считается и attempts лестницы не расходует. v8 ключевал потолок мёртвыми
    # профилями ставок (low: 0, standard: 1, high: 2); v11 — плоский потолок:
    # глубина проверки не масштабируется ни одной осью (ADR-0002), решение лида,
    # зафиксировано в телеметрии волны (срез 3 — issue #7).
    full_rounds_max: 2
    reverify: delta                            # после принятых правок — точечная проверка
                                               # named-находок и fix-hunks, не новый полный круг
    # Стоп по соразмерности: (токены гейтов + правок) / (токены продюсера) выше порога ->
    # оставшиеся находки в адъюдикацию и отчёт, не в новый раунд. Переопределение потолков
    # и стопа — явным решением лида с причиной в телеметрии, никогда молча (как у
    # fan_out.stale_base_max_behind). v11: тот же плоский потолок, что и у
    # full_rounds_max выше — тем же решением, той же причиной (ADR-0002).
    proportionality_stop: 2.0

# -----------------------------------------------------------------------------
# Кросс-провайдерные лейны (references/cross-provider.md).
# Постоянный мандат 2026-07-09: провайдер — решение лида; качество не сдвигается.
# Модели пиновать только проверенные по каталогу коннектора (правило 3 шапки).
# -----------------------------------------------------------------------------
cross_provider:
  enabled: auto-detect             # run-lane detect; нет поверхности -> Claude-дефолты

  # v4 (инцидент #6, 2026-07-12): стейджинг/рабочая область внешнего исполнителя
  # содержит ТОЛЬКО INPUTS его тикета — никогда соседние директории с выводами
  # других агентов. Для codex-лейнов: --cwd указывает на минимальную директорию
  # с INPUTS (или выделенный worktree), не на корень рабочей области. Барьер
  # структурный, а не поведенческий: Flash выдал найденный в соседней папке
  # результат Opus за свой — полагаться на добросовестность лейна нельзя,
  # ограничивается то, что лейн ВИДИТ (та же логика, что diff-с-диска у Codex).
  staging_inputs_only: required

  # v5 (кейс omp, 2026-07-12): доступ к внешним провайдерам — через OAuth-подписки
  # официальных CLI (codex login <- план ChatGPT/Codex; gemini/agy <- Google-аккаунт),
  # не через пометражные API-ключи: нулевая предельная стоимость уже оплаченных
  # подписок, отдельные от API квотные окна (в этом весь смысл спреда), токены
  # держит и обновляет вендорский CLI — в нашем конфиге нечему протекать. API-ключ —
  # только осознанное исключение решением владельца с записью причины в телеметрию.
  # Протухший логин = fallback_reason connector-error/subscription и просьба к
  # владельцу перелогиниться — не тихий переход на ключ. Будущие коннекторы
  # (например, Grok Build) подключаются по тому же правилу.
  auth: subscription-oauth-first

  # Пределы ожидания исполнителя run-lane (ADR-0007). Ожидание ограничено ЖИВОСТЬЮ
  # (idle — максимум тишины: нет вывода/прироста файла), а НЕ полной длительностью:
  # корректная-но-медленная модель (kimi max-эффорт) не убивается за то, что долго
  # думает. Второй предел — латентная огибающая лейна (max), записанная как
  # ТРЕБОВАНИЕ per-lane из фактической латентности (не случайный дефолт, §2.9).
  execution:
    idle_default_s: 300      # разумный инфраструктурный ПОЛ: столько тишины = зависший
                             # транспорт. Применяется, если у лейна нет своей огибающей.
    max_default_s: null      # без глобального потолка полной длительности — им правит
                             # idle; конкретный потолок объявляет лейн через latency_envelope.
    # ВНИМАНИЕ: лейны, чей транспорт МОЛЧИТ во время работы (burst-only: думание идёт
    # на сервере вендора, локальный CLI печатает лишь в конце — замеры 2026-07-23:
    # kimi 32с→>900с, grok 16с тишины), ОБЯЗАНЫ объявлять latency_envelope с idle_s,
    # покрывающим их тихое окно, — иначе idle-пол их ошибочно убьёт. Это требование
    # проверяет validate_config (регресс-страж, §2.10).

  lanes:
    # ЕДИНАЯ МОДЕЛЬ ВЫЗОВА (v26, решение владельца 2026-07-22): каждый ВНЕШНИЙ лейн
    # вызывается СВОЕЙ КОНСОЛЬНОЙ УТИЛИТОЙ (vendor CLI). Ни моста /opt/tools/agent-
    # bridge, ни MCP-сервера в пути лейнов больше нет — «только кодекс шёл уникальным
    # путём», теперь и он как все. Claude-работники в это НЕ входят (решение
    # владельца): у них Agent tool внутри харнесса — нативный путь с worktree,
    # телеметрией и контекстом; consoleный `claude -p` остаётся лишь запасом для
    # не-Claude хоста (ADR-0005, §Claude-работники).
    # ИСПОЛНИТЕЛЬ ПРИЗЕМЛЁН (ADR-0005, срезы 3–6 + S2a/S2b/S3, 2026-07-22): внешний
    # лейн раздаётся ЧЕРЕЗ tools/run-lane, а не прямым вызовом vendor-CLI лидом.
    # run-lane даёт неломающийся вызов: единый argv, артефакт снимается С ДИСКА по
    # --out, фактическая модель сверяется по свидетелю, всё в одном JSON-конверте.
    # Форма и режимы (`run-lane --lane …`, `run-lane detect`, `run-lane smoke`) —
    # references/cross-provider.md.
    # transport у КАЖДОГО лейна = имя его консольной утилиты.
    # v27 (срез 1, ADR-0005 §4): vendor:/surface: объявлены ПОЛЯМИ лейна на всех
    # шести оставшихся кросс-провайдерных лейнах (agy-opus/gemini-flash это уже
    # несли) — единственный источник принадлежности. availability.provider_map/
    # surface_map остаются механически проверяемым сводом (map_completeness_
    # violations), а не вторым независимым местом, где принадлежность решается
    # заново — их содержимое обязано совпасть с полями ниже.
    codex-critic:                  # кросс-модельная линза (зеркало Opus-xhigh критика)
      model: gpt-5.6-sol
      effort: xhigh                # `max` — по решению лида для труднейших вердиктов
      sandbox: read-only
      transport: codex-cli         # `codex exec` (не MCP, не мост)
      vendor: openai
      surface: openai-codex
      status: promoted             # v27, было cross_provider.promoted.codex-critic
      evidence: "critic 8/8 planted defects, 0 FP, read-only clean; preferred cross-model third lens (ahead of gemini-critic)"
    codex-code:                    # кодинг-рука (зеркало builder/Sonnet-high)
      model: gpt-5.6-terra
      effort: high
      # v28 (ADR-0005 поправка B, решение агентов при делегации владельца): лестница
      # эскалации из голых строк -> структурные {model?, effort}-override НАД этим
      # лейном. Прежний вид [terra-xhigh, sol-high, sol-xhigh] был неисполним: имена
      # не резолвились нигде, а sol-xhigh вёл в read-only codex-critic для WRITE-
      # задачи. Кортеж наследует sandbox/role/transport лейна (write сохраняется),
      # меняет лишь модель+эффорт. run-lane получает их флагами --model/--effort.
      escalation:
        - {effort: xhigh}                      # был terra-xhigh: та же terra, выше эффорт
        - {model: gpt-5.6-sol, effort: high}   # был sol-high
        - {model: gpt-5.6-sol, effort: xhigh}  # был sol-xhigh (write-песочница сохранена)
      sandbox: workspace-write     # cwd = выделенный worktree; никогда danger-full-access
      transport: codex-cli
      vendor: openai
      surface: openai-codex
      status: promoted             # v27, было cross_provider.promoted.codex-code
      evidence: "builder t1 11/11 hidden, t2 15/15 char + 30/30 fixture, 0 oob; well_specified_builder_tickets default + builder fallback"
    codex-recon:                   # дешёвая репо-разведка С shell (read-only)
      model: gpt-5.6-luna
      effort: medium
      bulk_effort: low
      vendor: openai
      surface: openai-codex
      status: promoted             # v27, было cross_provider.promoted.codex-recon
      evidence: "scout t1/t2 1.0/1.0, no sandbox violations; shell recon + scout availability fallback"
      sandbox: read-only
      transport: codex-cli
    grok-build:                    # v18: продвинут из пилота в полноценный лейн (ключ
                                   # исторический — теперь роли шире сборки, см. roles).
                                   # Решение владельца 2026-07-19 на данных: architect t3/t4/t5
                                   # (root-cause, кросс-модуль с приманкой, два гасящих бага со
                                   # сверкой величины) — FULL наравне с Opus/Fable/Sol; тест на
                                   # честность пройден (вынес FAIL по красным тестам, файлы не
                                   # тронул, хотя мог). Самый быстрый лейн.
      model: grok-4.5
      effort: high                 # high/medium/low; low для рутинной механики
      latency_envelope:            # ADR-0007: grok-cli burst-only (молчит во время
        idle_s: 1200               # работы, вывод одним блобом на завершении — замер:
        max_s: 1800                # 16с тривиально; на крупных билдер-тикетах 315–402с
        reason: >-                 # почти-тишины, S2b/S3 2026-07-22). idle-пол 300с
          grok молчит во время работы (думание server-side); на крупных тикетах наблюдались
          315–402с без вывода (срезы S2b/S3) — idle 20мин / max 30мин записаны как огибающая
          лейна, чтобы idle-пол не убил корректную сборку. Самый быстрый лейн, но не мгновенный.
      sandbox: orchestrate         # v17: fail-closed профиль (extends strict + deny),
                                   # references/grok/; worktree ОБЯЗАТЕЛЕН.
      transport: grok-cli          # `grok -p` (консольная утилита xAI)
      hardening: grok_hardening    # v17: обязателен перед диспетчем
      roles: [builder, recon, diagnosis, standards-lens, spec-lens, critic]
      # v18: never_critic СНЯТ (был: METR reward-hacking). Оговорки к креслу критика:
      #  (а) self-preference guard — grok НЕ судит деливерабл своего вендора (grok);
      #  (б) METR-запись серьёзна и снята ОДНОЙ пробой — честность отслеживаем: каждый
      #      вердикт критика сверяется детерминированным прегейтом (PASS на красных
      #      проверках всплыл бы сразу). Пересмотреть при первом сигнале нечестности.
      critic_eligible: honesty-cleared-2026-07-19
      prefer_for: latency-sensitive   # быстрый оборот сборки/разведки без ultra-цены Codex
      vendor: xai
      surface: xai
      status: promoted             # v27, было cross_provider.pilots.promoted.grok-4.5
                                   # (+ pilots.on_pilot.grok-build_superseded, снят как избыточный
                                   # — «superseded» уже выражено самим status: promoted)
      evidence: "architect t3/t4/t5 (root-cause; кросс-модуль с приманкой; два гасящих бага со сверкой величины) — FULL наравне с Opus/Fable/Sol; тест честности пройден: как критик по красным тестам вынес FAIL, файлы не тронул, хотя мог писать. Роли: builder/recon/diagnosis/standards-lens/spec-lens/critic. Оговорки: self-preference guard (не судит grok), честность отслеживаем (METR-запись + одна проба), worktree+hardening обязательны, самый быстрый лейн."
    composer-build:                # ПИЛОТ дешёвого исполнителя (v14)
                                   # ADR-0005 F2: кандидат на УДАЛЕНИЕ (не критик, не
                                   # применялся, дублирует поверхность xAI).
      model: grok-composer-2.5-fast
                                   # reasoning-effort НЕ поддерживает (быстрая кодовая модель)
      latency_envelope:            # ADR-0007: grok-cli burst-only. Composer — быстрая
        idle_s: 600                # кодовая модель, окно тишины короче grok-4.5, но
        max_s: 900                 # ненулевое; idle 10мин / max 15мин.
        reason: grok-cli burst-only; быстрая модель, но молчит во время работы — огибающая записана (§2.9).
      sandbox: orchestrate         # v17: тот же кастомный fail-closed профиль (см. grok-build)
      transport: grok-cli
      never_critic: true
      spell_out_conventions: true  # v14: t1-провал — угадал не тот порядок кодов; в тикет
                                   # Composer конвенции (порядок кодов/полей) писать ЯВНО
      hardening: grok_hardening    # v17
      # composer НЕ critic_eligible: на честность/суждение не тестировался (дешёвый
      # быстрый кодер, не k3). never_critic остаётся до отдельной проверки.
      vendor: xai
      surface: xai
      status: on-pilot             # v27, было cross_provider.pilots.on_pilot.composer-2.5
      evidence: "scout все размеры 1.0; builder t1 FAIL (переставил коды DEP-101↔102 — порядок в спеке не задан явно, 4/5 угадали конвенцию), НО builder t2 PASS (47, чисто). Провал — не слабость логики, а промах вывода НЕЯВНЫХ конвенций. Пилот дешёвого исполнителя (scout крупной механики + builder) с ОГОВОРКОЙ: в тикетах Composer явно прописывать конвенции (порядок кодов/полей), не полагаться на угадывание. worktree (песочница Grok-CLI читает диск), never_critic. Порог решения — cross_provider.pilots.exit_after_records."
    kimi-k3:                       # v18: новый лейн — Moonshot Kimi Code CLI, модель k3,
                                   # контекст 1M, подписка Allegretto (OAuth). Решение
                                   # владельца 2026-07-19 на данных: architect t3/t4/t5 FULL
                                   # наравне с Opus + тест честности пройден.
      model: kimi-code/k3          # ПОЛНЫЙ алиас модели из ~/.kimi-code/config.toml —
                                   # провайдерный префикс ОБЯЗАТЕЛЕН. Голый `k3` даёт
                                   # config.invalid → transport-death (модель ищется как
                                   # [models."k3"], а она объявлена как [models."kimi-code/k3"]).
                                   # Проверено живьём 2026-07-22: KIMI_OK за 17с. k3 = контекст 1M.
      # effort НЕ объявляем: у kimi CLI НЕТ флага per-call reasoning-effort — эффорт берётся
      # из ~/.kimi-code/config.toml ([thinking].effort / модельный default_effort; у k3 = max).
      # Поэтому run_lane capability supports_effort=no, и лейн эффорт не задаёт.
      latency_envelope:            # ADR-0007: k3 на max-эффорте — burst-only (думает
        idle_s: 1800               # server-side, локально МОЛЧИТ до финального flush;
        max_s: 2400                # замер: 32с тривиально → >900с крупно, инцидент S3).
        reason: >-                 # idle-пол в 300с убил бы корректную работу, поэтому
          k3 max-эффорт рассуждает server-side и локально молчит до завершения; idle не
          видит работу, огибающая (idle 30мин / max 40мин) записана как требование §2.9,
          не случайный дефолт. Тюнить по телеметрии реальных крупных тикетов.
      transport: kimi-cli-headless # `kimi -p` (немодифиц. официальный CLI, ToS-совместимо),
                                   # драйвинг Orca-терминалом; НЕ через bridge (подписочный
                                   # токен нельзя переиспользовать — бан по ToS).
      hardening: kimi_hardening    # references/kimi/: telemetry=false + env-выключатели.
                                   # Своей ФС-песочницы НЕТ -> worktree + OS/контейнер-изоляция.
      roles: [builder, recon, diagnosis, standards-lens, spec-lens, critic]
      critic_eligible: honesty-cleared-2026-07-19   # self-preference guard: kimi не судит kimi
      # v19.1 (2026-07-19): ограничение client_data СНЯТО решением владельца
      # (он контролёр данных клиентов). Kimi обучается на контенте без opt-out —
      # это принято осознанно; данные клиентов через Kimi разрешены.
      vendor: moonshot
      surface: moonshot
      status: promoted             # v27, было cross_provider.pilots.promoted.kimi-k3
      evidence: "architect t3/t4/t5 — FULL наравне с Opus; тест честности пройден (FAIL по красным тестам, файлы не тронул). recon: 1M-контекст полигоном не задействован (греппится), преимущества над haiku нет — брать не ради recon, а как фронтир-судью/билдера. Роли те же. Оговорки: self-preference guard, worktree+OS-изоляция (своей песочницы нет), kimi_hardening."
    # =========================================================================
    # ФОРМА ВЫЗОВА agy — ЕДИНСТВЕННАЯ ПРАВИЛЬНАЯ (v23, 2026-07-21, установлено
    # экспериментом + подтверждено CHANGELOG/issue #76 репозитория antigravity-cli):
    #
    #   agy --model "<имя>" [--effort <low|medium|high>] --print-timeout 5m \
    #       -p "<промпт>" < /dev/null
    #
    # ДВЕ ЛОВУШКИ, каждая из которых даёт ТИХИЙ и правдоподобный мусор:
    #  (1) `-p`/`--print` — НЕ булев флаг: он съедает следующий токен как промпт.
    #      Форма `agy -p --model "<имя>" "<промпт>"` (стояла в этом файле с v19)
    #      означает промпт «--model»: модель не разбирается вовсе, настоящий промпт
    #      теряется, а канал отвечает ПРИВЕТСТВИЕМ. Все флаги — ПЕРЕД `-p`, текст
    #      промпта — последним аргументом.
    #  (2) Незакрытый stdin: при спавне из Python/Node труба остаётся открытой без
    #      EOF, и agy виснет в ожидании ввода. Явно `< /dev/null` (в коде —
    #      stdin=DEVNULL).
    #  (3) v24 (2026-07-21, установлено экспериментом): РАБОЧИЙ КАТАЛОГ НЕ
    #      НАСЛЕДУЕТСЯ. `cd <workspace> && agy ...` НЕ помещает агента в этот
    #      каталог: в журнале workspaceDirs выставлен верно, но инструменты агента
    #      работают в СВОЁМ scratch (`/root/.gemini/antigravity-cli/scratch`).
    #      Агент не находит выданные материалы и НАЧИНАЕТ ИХ ИСКАТЬ по диску.
    #      ОБЯЗАТЕЛЬНО передавать `--add-dir <абсолютный путь>` — проверено: с ним
    #      материалы находятся и задача сдаётся, без него нет.
    #      ЭТИМ ЖЕ ОБЪЯСНЯЕТСЯ ИНЦИДЕНТ #6 (июль): «Gemini запустил find / и залез
    #      в соседний воркспейс» — это не своеволие модели, а поиск материалов,
    #      которых ей не выдали. Обвинение с модели снимается, причина — в вызове.
    #      Наблюдалось на ТРЁХ разных моделях подряд (gemini-flash, claude-opus-4.6,
    #      gpt-oss): значит свойство харнесса, не модели. Из троих только gpt-oss
    #      повёл себя по договору — вернул NEEDS_CLARIFICATION вместо импровизации.
    #  (4) v25, САМОЕ ВАЖНОЕ ПРАВИЛО ДНЯ — ПРИНИМАТЬ АРТЕФАКТ С ДИСКА, НЕ ИЗ ОТВЕТА.
    #      Печать в ответ ограничена по размеру. Всё, что длиннее короткого абзаца,
    #      усекается — и модель, видя обрыв, ПЕРЕСКАЗЫВАЕТ свой результат по памяти:
    #      правдоподобно и неверно. Измеряли именно пересказ и трижды сделали ложный
    #      вывод («gemini выдумывает цитаты», «канал портит дословность», «длинные
    #      перечисления невозможны»). Все три НЕВЕРНЫ.
    #      Доказательство (полигон recon t3, 601 файл, 450 меток):
    #        по напечатанному  — gemini 48/450, claude-opus-4.6 95/450 (провал);
    #        ПО ФАЙЛУ С ДИСКА  — gemini 450/450, claude-opus-4.6 450/450 (оба чисто),
    #        причём файлы ответов ПОБАЙТОВО ИДЕНТИЧНЫ.
    #      ПРАВИЛО: тикет внешнему лейну ОБЯЗАН задавать путь файла-результата, а лид
    #      принимает и грейдит ФАЙЛ. Ответ в печати — отчёт о работе, не работа.
    #      Это тот же принцип, что уже действовал для кодовых лейнов («дифф только с
    #      диска»); он просто не был распространён на нефайловые деливераблы.
    #
    # ПЕРЕСМОТР ИСТОРИИ. Инциденты, на которых стоят Gemini-ограничения, выглядят
    # как следствия (1)/(2) и уже исправленных багов самого CLI, а НЕ свойств
    # модели: 1.0.15 — print-режим молча терял stdout вне TTY; 1.1.1 — серверная
    # ошибка давала код 0 и пустой вывод; 1.1.2 — нерезолвящийся --model молча
    # откатывался на дефолт (теперь честная ошибка со списком); 1.1.3 — headless
    # больше не виснет и не самоодобряет тул-вызовы. Установлено: 1.1.5.
    # ОБЪЕКТИВНЫЙ СВИДЕТЕЛЬ — какая модель РЕАЛЬНО ушла на сервер. Самоотчёт модели
    # («какая ты модель») врёт: во всех пробах 2026-07-21 отвечал «Gemini 3.1 Pro»
    # независимо от факта. Проверять только по журналу, который agy пишет САМ на
    # каждый запуск (флаг включать не нужно):
    #     ~/.gemini/antigravity-cli/log/cli-<YYYYMMDD_HHMMSS>.log
    #     (симлинк ~/.gemini/antigravity-cli/cli.log — на самый свежий)
    #   grep 'Propagating selected model override to backend' <лог>   # что ушло
    #   grep 'Print mode: starting'                          <лог>   # что запрошено
    # Вторая строка несёт promptLength — ею же ловится ловушка (1): при форме
    # `agy -p --model ...` в журнале видно model="" и promptLength=7, то есть на
    # сервер ушёл текст «--model» (7 символов) вместо промпта. Это и есть способ
    # отличить «модель не та» от «промпт не доехал», не полагаясь на слова модели.
    # ПОПРАВКА к прежней записи: собственный конфиг agy — это
    # ~/.gemini/antigravity-cli/settings.json (лейбл «Gemini 3.1 Pro (High)»), а НЕ
    # ~/.gemini/settings.json: тот принадлежит другому инструменту (открытый gemini
    # CLI) и на agy не влияет — они лишь делят родительский каталог.
    # Проверено живьём 2026-07-21 на правильной форме (подтверждено журналом):
    #   - «Gemini 3.6 Flash (Low)» -> на сервер ушла Gemini 3.6 Flash (Low); 357 слов
    #     связного текста за 5.5 с;
    #   - слаг `gemini-3.6-flash` + `--effort low` -> тот же лейбл на сервере, обе
    #     записи равноправны;
    #   - неверное имя -> КОД ВОЗВРАТА 1, текст ошибки в stderr со списком моделей,
    #     stdout пуст. Лейн падает ГРОМКО — тихой подмены нет (починено в CLI 1.1.2).
    # ОБЁРТКА gemini-mcp-tool — НЕ ТРАНСПОРТ ЛЕЙНА. Решение владельца 2026-07-21.
    # Это сторонний npm-пакет (v1.1.8, тянется npx-ом; нашей была только настройка
    # GEMINI_MCP_BACKEND=agy). В его коде зашито `supportsModelSelection: false` для
    # agy-бэкенда и комментарий «deliberately NO --model (it hangs -p)»: он НИКОГДА
    # не передаёт модель и удаляет запрошенную. Ручки, чтобы это включить, НЕТ —
    # проверено: у пакета только AGY_BASE/AGY_CLI_PATH/AGY_PTY/AGY_PRINT_TIMEOUT/
    # GEMINI_MCP_TIMEOUT и т.п.; проба возможностей смотрит на --output-format,
    # --conversation, --continue, --print-timeout, но НЕ на модель.
    # Последствие, вскрытое журналом: раз модель не передаётся, agy берёт СВОЙ дефолт,
    # а он здесь «Gemini 3.1 Pro (High)». То есть на этом пути мы получали Pro, а
    # конфиг обещал Flash (проверено 2026-07-21: вызов через обёртку, promptLength=158,
    # model="" -> label="Gemini 3.1 Pro (High)"). Причина, которую пакет называет
    # («print прибит к 3.5 Flash», «--model подвешивает»), — это две наши ловушки:
    # подвисание даёт незакрытый stdin (пакет спавнит из Node — ровно тот случай).
    # ПРАВИЛО: ни один лейн не ходит через обёртку. Только прямой agy в форме выше.
    # Обёртка остаётся лишь как удобство для разового вопроса в сессии, вне лейнов и
    # вне гейта; ничего, что попадает в телеметрию как модель, через неё не идёт.
    # СЛЕДСТВИЕ, ТРЕБУЮЩЕЕ РЕШЕНИЯ ВЛАДЕЛЬЦА: блокировки Gemini ниже (critic_blocked_by,
    # снятие с оси Standards) выведены из тех инцидентов и потому под вопросом.
    # Не снимаю их молча — нужен ре-тест на правильной форме вызова.
    # =========================================================================
    # Pro-контекст 2M — силён для глубокого ревью больших диффов.
    # v25 (2026-07-21): Google-пул отдаёт НЕ ТОЛЬКО Gemini. `agy models` перечисляет
    # claude-opus-4-6-thinking, claude-sonnet-4-6 и gpt-oss-120b-medium. Это законно:
    # мы запускаем ОФИЦИАЛЬНЫЙ CLI Google под аккаунтом владельца, а модели Claude
    # там лицензированы самим Google — это не подписочный токен Anthropic в чужом
    # харнессе (та схема запрещена, см. карту вендорских политик).
    agy-opus:                      # фронтир-Claude на квоте Google
      model: claude-opus-4-6-thinking     # единственный вариант = максимальный
      transport: agy-print                # форма вызова и оба правила — в рамке выше
      vendor: anthropic            # ВЕНДОР МОДЕЛИ -> independence_filter (кто кого судит)
      surface: google-antigravity  # ПОВЕРХНОСТЬ/КВОТА -> breaker (что гаснет вместе)
      # Разведение vendor/surface — не педантизм: без него ось Standards получила бы
      # «не-Claude читателя», который на деле Claude, и страж независимости этого
      # не заметил бы. Данные: recon t3 450/450 (файл ответа побайтово совпал с
      # gemini-flash), диагностика через тот же канал отработала штатно.
      never_standards_lens: true   # ось требует не-Claude по построению
    gemini-flash:                  # v27 (срез 2, ADR-0005 §5): ЕДИНСТВЕННЫЙ Gemini-лейн —
                                   # gemini-recon, gemini-recon-cheap, gemini-pro-recon и
                                   # gemini-critic слиты сюда: буквально одна модель (Gemini
                                   # 3.6 Flash (High)) и один транспорт (agy-print), четыре
                                   # ключа выражали одно и то же (v23 уже признавал это в
                                   # комментариях трёх из четырёх — «при следующей правке
                                   # слить»). Роли и вход в судейские пулы — availability.
                                   # fallbacks ниже.
      model: "Gemini 3.6 Flash (High)"
      transport: agy-print
      vendor: google
      surface: google-antigravity
      roles: [recon, scout, critic, spec-lens, standards-lens]
      # v23 (решение владельца 2026-07-21): ДОПУЩЕН ВО ВСЕ ТРИ СУДЕЙСКИЕ РОЛИ —
      # critic, spec-lens, standards-lens (прежний запрет critic_blocked_by:
      # agy-print-tool-unreliability СНЯТ, но не «прощён», а ЗАМЕНЁН УСЛОВИЕМ: судит
      # по ВЛОЖЕННОМУ материалу, живые инструменты запрещены). v27: условие — это
      # свойство ОСИ (кто судит), не лейна, поэтому оно переехало в gates.lenses
      # (non_agentic_lane_delivery / non_agentic_lane_never / requires_pregate_
      # output_inline там) — раньше сидело здесь как lanes.gemini-critic.delivery /
      # .never / .requires_pregate_output_inline (ADR-0005, раздел «Шов»).
      # Честность при данных в промпте ПРОВЕРЕНА: увидев вывод pytest, Gemini вынес
      # FAIL и назвал оба упавших теста (разбор 2026-07-21). Инцидент #6 (обход
      # `find /`, контаминация соседа) — свойство формы вызова (`--add-dir` не
      # передавался), не модели; правильная форма — в рамке выше.
      verify_first_run: model-label-in-agy-log
      # ПЕРВЫЙ ЖЕ прогон сверить с журналом agy: 'Propagating selected model
      # override' обязана дать «Gemini 3.6 Flash (High)».
    # =====================================================================
    # NB: v24 СНИМАЛ Gemini со всех ролей и ОТМЕНЁН в v25 (см. шапку файла) —
    # снятие стояло на ошибке ИЗМЕРЕНИЯ (грейдился пересказ в печати, а не файл
    # с диска; по файлам gemini и claude-opus-4.6 дали 450/450). Настоящий счёт
    # Gemini: диагностика 3/3, разведка 48/48 и 450/450, ни одного провала.
    # Поле `routed: false` из того плана НИКОГДА не вводилось; лейны маршрутизируются.
    # Полный разбор — benchmark/results/2026-07-21-gemini-3.6-flash/RESULTS.md.
    # v27: четыре прежних ключа (gemini-recon, gemini-recon-cheap, gemini-pro-recon,
    # gemini-critic) слиты в gemini-flash выше; их отдельная история решений (v19/v23,
    # включая not_on_pilot.gemini-recon-cheap — снятое тем же v23) осталась в git-
    # истории файла, здесь не дублируется, чтобы не плодить лишние ключи.
    # =====================================================================
    # v23: лейн gemini-spec-lens (Gemini 3.1 Pro в spec-линзе) заведён и СНЯТ тем же
    # днём решением владельца 2026-07-21. Ось судейская, и вход на неё Gemini держался
    # на связке «Pro достижим только прямым agy» + «прямой канал безопасен, пока не
    # запускаются инструменты» — то есть на условии, которое надо соблюдать всякий
    # раз. Владелец предпочёл не вносить это условие в гейт. Оставлено записью, чтобы
    # предложение не заводили повторно как новое.

  # v17 (аудит grok-build 2026-07-18, память grok-build-audit.md): обязательное
  # ужесточение обоих Grok-лейнов. Grok-CLI по умолчанию БЕЗ песочницы и с живым,
  # удалённо-включаемым каналом выгрузки в GCS xAI (untracked-файлы, .ssh/.pem/.env
  # НЕ исключены). Три уровня защиты + проверка; без применённой песочницы Grok не
  # диспетчить (fail-closed). Готовые файлы и обоснование — references/grok/.
  grok_hardening:
    config_file: references/grok/config.toml   # -> ~/.grok/config.toml (bootstrap ставит, если нет)
    sandbox_profile: orchestrate               # кастом extends strict + deny; наличие deny =>
                                               # обязательный bubblewrap => fail-closed
    # env спавнера лейна (дублируют config, переживают подмену файла):
    env:
      GROK_SANDBOX: orchestrate
      GROK_TELEMETRY_ENABLED: "0"
      GROK_TELEMETRY_TRACE_UPLOAD: "0"
      DISABLE_ERROR_REPORTING: "1"
      GROK_DISABLE_AUTOUPDATER: "1"
    # Проверка в раннере ПОСЛЕ старта лейна: без ProfileApplied — валить прогон.
    preflight_verify: "~/.grok/sandbox-events.jsonl содержит ProfileApplied; ApplyFailed / 'sandbox could not be applied' в stderr = FAIL"
    version_pin_target: "self-build 0.2.102 из открытого дерева (без вшитых точек выгрузки); до готовности — официальный бинарь, ужатый тремя уровнями (наружу только инференс); 0.2.101 вывести после пина"
    dispatch_gate: "нет применённой песочницы orchestrate -> Grok-лейн не диспетчить"

  # v18: ужесточение Kimi (аудит 2026-07-18, references/kimi/README.md). У Kimi нет
  # grok-подобной выгрузки репо, но телеметрия и авто-обновление включены по умолчанию,
  # а логин сам прописывает серверные search/fetch. Своей ФС-песочницы нет.
  kimi_hardening:
    config_file: references/kimi/config.toml   # telemetry=false -> ~/.kimi-code/config.toml
    env:                                       # спавнер лейна (не трогает интерактив владельца)
      KIMI_DISABLE_TELEMETRY: "1"
      KIMI_CODE_NO_AUTO_UPDATE: "1"
      KIMI_DISABLE_CRON: "1"
    isolation: "своей песочницы нет -> worktree + OS/контейнер (Orca); worktree НЕ барьер чтения"
    never_feedback: "/feedback не использовать — даже «Logs only» выгружает полный диалог"
    # client_data_gate снят 2026-07-19 (решение владельца-контролёра данных)

  # v28 (2026-07-22): блоки `defaults` и `promoted` РАСТВОРЕНЫ ПОЛНОСТЬЮ (ADR-0005 §5).
  # Прежде defaults дублировал головы цепочек availability.fallbacks (голова уже
  # читается из fallbacks.<роль>[0], второй записи не нужно), а promoted держал
  # историю промоций. Оба стали дрейф-риском. Последний ключ defaults.standards_lens
  # (Standards-ось — равный пул, не одиночный дефолт: fallbacks.standards-lens) и
  # пустой promoted:{} держались v27 лишь потому, что проза цитировала их пути
  # бэктиком; проза переведена на равно-пуловую модель (references/cross-provider.md,
  # SKILL.md), пути больше не цитируются — блоки убраны. Промоции codex-лейнов и
  # мотив квота-спреда живут в status:/evidence: самих лейнов (cross_provider.lanes)
  # и в цепочках availability.fallbacks.

  # Пилоты кросс-лейнов: механизм сохранён для будущих лейнов (новый провайдер
  # проходит тот же путь: проверка по каталогу коннектора -> полигон ролей ->
  # пилот с реальным трафиком -> решение пользователя).
  # v27 (срез 2): исторические записи (grok-4.5/kimi-k3 промоция, composer-2.5
  # пилот) сжаты в status:/evidence: соответствующих лейнов (grok-build,
  # kimi-k3, composer-build) — здесь остаётся только сам механизм для лейнов,
  # которых ещё нет. Записи not_on_pilot.gemini-recon-cheap и примыкающий
  # комментарий про gemini-critic — сняты: обе относились к лейнам, слитым в
  # gemini-flash, и уже были отменены v23 (история — git log этого файла).
  pilots:
    exit_after_records: 10           # порог решения по каждому будущему лейну

  # Что НЕ сдвигается мандатом никогда (качество — инвариант, квота — нет):
  never_shift:
    - the lead itself stays the session model (orchestration judgment)
    # v18: было «primary grader = Claude critic». Снято по решению владельца на данных
    # (grok-4.5, kimi-k3 прошли тест честности + t3/t4/t5 FULL). Теперь инвариант —
    # не «вендор грейдера», а ЧЕСТНОСТЬ и НЕЗАВИСИМОСТЬ:
    - every gated deliverable is graded by a critic that (a) did NOT build it and
      (b) is NOT the deliverable's own vendor — self-preference guard, ADR-0001;
      grader may be any honesty-cleared lane (opus, critic, sol, grok-4.5, kimi-k3)
    - Fable stays the DEFAULT for judgment-class (architect), not the only option
    - local repo file-walking recon defaults to scout (economics)
    - the escalation ladder (failed cross-provider ticket escalates to its default)

  ultra_policy:
    critic_lanes: never            # суб-агенты той же модели покупают стоимость, не независимость
    builder_condition: genuinely hard AND latency-sensitive
    log_reason: required           # effort: ultra в телеметрии с записанной причиной

  # v18: скорость Grok как сигнал маршрутизации (полигон 2026-07-19: grok-4.5
  # стабильно самый быстрый при полном качестве). Раньше «трудно И срочно» покрывал
  # только дорогой Codex-ultra; теперь у срочного есть дешёвый быстрый маршрут.
  latency_sensitive:
    # ЧТО СЧИТАЕТСЯ срочным (иначе «скорость» — пустой вибрирующий ярлык). Уменьшение
    # wall-clock ЭТОГО тикета сокращает ожидание — истинно ТОЛЬКО когда:
    applies_when:
      - human-blocking: владелец ждёт результат вживую (интерактивный запрос)
      - critical-path: тикет блокирует другие (его готовность открывает фронтир);
                       ускорять самый блокирующий, не любой
      - iteration-heavy: много последовательных шагов (red-green цикл) — быстрота
                         за итерацию складывается
    not_when: параллельный веер независимых тикетов — лид ждёт самого медленного,
              ускорение одного ничего не даёт
    # Правило: среди ДОСТАТОЧНЫХ по качеству лейнов для тикета выбрать самый быстрый
    # (grok-4.5) вместо дорогого Codex-ultra. Тайбрейк по скорости, НЕ понижение
    # мощности: судейский/трудный тикет остаётся у сильной модели, даже если Grok
    # быстрее. Гейт трёх линз не трогается — срочность влияет на выбор исполнителя,
    # не на глубину проверки.
    tiebreak_prefer: grok-build
    over: [codex-code-ultra]

# -----------------------------------------------------------------------------
# Замены при НЕДОСТУПНОСТИ модели (SKILL.md Step 2, «Availability fallbacks»).
#
# Недоступность — кончилось окно лимитов, не оплачена подписка, коннектор
# отсутствует/разлогинен, поверхность отвечает ошибкой — это НЕ провал качества:
# попытки лестницы эскалации (routing.escalation) она не расходует, и вердикт
# тикета от неё не портится. Правило направления: замена никогда не опускается
# ниже пола качества класса — только «вбок» (равный тир другого провайдера)
# или «вверх» (дороже, но не хуже).
#
# Чтение цепочки: первый ДОСТУПНЫЙ элемент выигрывает; последний элемент —
# терминальное поведение, когда недоступно всё:
#   report-blocker  — честный блокер-отчёт пользователю (работа не имитируется)
#   lead-inline     — лид делает подзадачу сам, в главном цикле
#   skip-third-lens — легитимен только для опциональной ad hoc консультации вне гейта
#                     (Two surfaces, cross-provider.md); гейт-обязательную ось пропустить
#                     нельзя — для неё см. sonnet-inline-note ниже
#   sonnet-inline-note — v12 (срез 4, issue #8): для гейт-обязательных осей (Standards)
#                     пропуска нет — терминал исполняет ось Claude-моделью (sonnet)
#                     инлайн в главном цикле, с пометкой в финальном отчёте
# Каждый сработавший рерут штампуется в телеметрию полями fallback_from /
# fallback_reason (quality.md §7).
# -----------------------------------------------------------------------------
availability:
  # v20 (2026-07-19, проект архитектора «устойчивость к падению провайдера»):
  # пофейсовые цепочки — ПЕРВАЯ линия (один вызов не удался). Предохранитель по
  # провайдеру (breaker ниже) — ВТОРАЯ: провайдер лёг целиком -> разом перебросить
  # все его лейны, не долбясь в мёртвое. Цепочки переписаны под v18/v19 (закрыты
  # дыры: критик/архитектор были одно-провайдерными, spec-линзы не было вовсе,
  # gemini-critic висел в Standards вопреки блокировке).
  fallbacks:
    # ДВА ПРИНЦИПА ПОРЯДКА — раньше не были названы, и одинаковый синтаксис читался
    # как одна и та же шкала (замечание владельца 2026-07-21). Позиция в цепочке
    # означает РАЗНОЕ в зависимости от роли:
    #   (а) СУДЕЙСКИЕ роли (architect, critic, spec-lens, standards-lens) — порядок
    #       выражает предпочтение по силе/роли оси; равные записаны как `equal:`;
    #   (б) ИСПОЛНИТЕЛЬСКИЕ роли (builder, scout, кросс-провайдерные лейны) — порядок
    #       выражает ЭКОНОМИКУ: сначала самое дешёвое ДОСТАТОЧНОЕ, дорогое последним.
    #       Поэтому opus в конце builder — это «самый дорогой», а НЕ «самый слабый»:
    #       поднять его выше значит жечь дорогую модель на самой массовой роли всякий
    #       раз, когда закрылось окно дешёвой. Правило направления (замена только вбок
    #       или вверх, никогда вниз) обоими принципами соблюдается одинаково.
    # Claude-агенты. critic: fable УБРАН (не в ticket-eligible never_shift; конфликт
    # с fable_ceiling_uses) — теперь три внешних вендора закрывают роль.
    # v23: две судейские цепочки перестали быть чистым порядком предпочтения.
    # Элемент вида `equal: [...]` — РАВНОПРАВНЫЙ ПУЛ: цепочка читается позиционно
    # как прежде, но дойдя до такого элемента, лид выбирает ВНУТРИ него по
    # equal_weight_selection, а не по позиции в списке. Порядок имён внутри
    # `equal` — только детерминированный тайбрейк, не сила модели.
    architect:
      - fable                                    # дефолт класса judgment (never_shift)
      # v25: в пул добавлены обе модели Google-пула. agy-opus — фронтир-Claude на
      # чужой квоте; gemini-flash сдал те же t3/t4/t5, что и grok/kimi.
      # ПОРЯДОК ЗАДАН ВЛАДЕЛЬЦЕМ 2026-07-21: сначала проверенная четвёрка, новички
      # Google-пула — в хвост. Внутри `equal` порядок работает как ДЕТЕРМИНИРОВАННЫЙ
      # ТАЙБРЕЙК (при равных счётчиках диспетча берётся первый по списку), а не как
      # предпочтение по силе. Заметно это в начале прогона, когда счётчики нулевые:
      # первым уйдёт opus, а не agy-opus. Если нужно именно ПРЕДПОЧТЕНИЕ (Google-пул
      # только когда четвёрка недоступна) — это два отдельных `equal`-элемента, как
      # сделано у spec-lens; здесь сознательно один пул.
      - equal: [opus, sol, grok-4.5, kimi-k3, agy-opus, gemini-flash]   # v28: sol-xhigh -> sol (эффорт xhigh из лейна)
      - report-blocker
    critic:                                      # грейдер не обязан быть Claude (v18);
      # v23: пятым добавлен gemini-critic (Gemini 3.6 Flash High) — решение владельца
      # 2026-07-21. Условие допуска на ЭТУ ось строже прочих: вывод детерминированного
      # прегейта вкладывается в промпт (v27: gates.lenses.critic.requires_pregate_
      # output_inline — было lanes.gemini-critic.requires_pregate_output_inline).
      # v25: gemini ВОЗВРАЩЁН (снятие v24 отменено — см. шапку), добавлен agy-opus.
      # v27: gemini-critic слит в gemini-flash (срез 2, ADR-0005 §5); условие на ЭТОЙ
      # оси остаётся — вывод прегейта вкладывается в промпт.
      - equal: [opus, sol, grok-4.5, kimi-k3, gemini-flash, agy-opus]   # independence_filter — ДО ротации
      - report-blocker
    # v23: OpenAI-лейн в сборке назван явно, чтобы модель не пряталась за алиасом.
    # codex-code = gpt-5.6-terra, effort high (кодовая рука семейства; единственная
    # с детерминированным зачётом за сборку: builder t1 11/11, t2 15/15 + фикстура
    # 30/30, 0 выходов за выданные пути, 0 нарушений песочницы). НЕ sol — он занят
    # судейской ролью и несёт рекордную METR-запись по подгонке под критерий: писать
    # код и самому себе создавать видимость приёмки — худшее сочетание; sol остаётся
    # СТУПЕНЬЮ ЭСКАЛАЦИИ внутри лейна (cross_provider.lanes.codex-code.escalation),
    # не дефолтом. НЕ luna — тир разведки (0.921 на инвентаризации при планке 0.95).
    # Исполняемый пин живёт в одном месте — cross_provider.lanes.codex-code; здесь
    # он назван комментарием сознательно: два исполняемых пина разошлись бы.
    builder:
      # v23: голова цепочки — РАВНЫЙ ПУЛ рабочих лошадей (решение владельца
      # 2026-07-21: grok и kimi по уровню равны, отдельный builder-прогон признан
      # избыточным). Ротация здесь даёт наибольшую экономию Claude-квоты: роль
      # самая объёмная во всём конвейере.
      # ПРЕДУСЛОВИЕ членства: grok-build требует fail-closed профиля orchestrate,
      # kimi-k3 собственной ФС-песочницы не имеет вовсе — обоим worktree ОБЯЗАТЕЛЕН
      # (cross_provider.lanes.*.hardening). Волна, которая не может выдать
      # изолированное дерево, исключает эти два лейна из пула, а не запускает их без
      # изоляции.
      # v25: добавлен agy-opus — фронтир-Claude на квоте Google. Самая объёмная роль
      # конвейера уходит с дефицитного Claude-window. Радиус ограничен worktree +
      # детерминированными проверками + гейтом, поэтому риск принят.
      # ПЕРВЫЙ прогон сверить: артефакт берётся С ДИСКА (см. правило artifact_from_disk).
      - equal: [sonnet, codex-code, grok-build, kimi-k3, agy-opus]
      - opus            # последний по ЦЕНЕ, не по силе (принцип «б» выше)
      - lead-inline
    # v23 (замечание владельца 2026-07-21): ПОРЯДОК ПЕРЕВЁРНУТ. Прежний ставил haiku
    # первым «как самое дешёвое», но цена токена — не тот дефицит. Оркестрация
    # запускается ИЗ Claude, значит haiku доступен ВСЕГДА и цепочка на этой роли не
    # срабатывает никогда: разгрузка Claude на самой массовой механической работе не
    # происходила вообще, а расходовалось ровно то окно, которое кончается за 1–2 дня
    # до сброса. У Google-квоты владельца потолок практически не достигается.
    # Качество это подтверждает: на scout t3 (38 позиций) Gemini Flash — единственный
    # из дешёвых, кто прошёл (haiku 0.868, luna 0.921 при планке 0.95).
    # НО «первый» здесь НЕ значит «всегда, когда доступен» (уточнение владельца
    # 2026-07-21: из цепочки это читалось именно так). Разведка распадается на два
    # РАЗНЫХ вида работы, и лейны делят их по инструментам, а не по очереди:
    #   ИСКАТЬ  (найди все места, где ...) -> haiku. Работа И ЕСТЬ поиск; у scout
    #           инструменты поиска встроены. У gemini-лейна их нет: чтобы отдать
    #           задачу ему, поиск должен выполнить ЛИД — то есть тот же Claude
    #           сделает работу, а лейн лишь перепишет ответ. Разгрузки ноль.
    #   ЧИТАТЬ  (вот корпус: раздели по признаку, извлеки, сверь, посчитай) ->
    #           gemini-flash (v27: было gemini-recon-cheap, слит сюда). Материал уже
    #           собран и кладётся в промпт; на таком задании (scout t3=38, приманка
    #           инлайном) он единственный из дешёвых прошёл чисто, а объём чтения ему
    #           безразличен.
    # Экономика этого деления: токены жжёт ЧТЕНИЕ материала, не сам поиск (перебрать
    # репозиторий грепом дёшево, прочитать сотни файлов дорого). Поэтому на Google-
    # квоту уходит тяжёлая половина, на Claude остаётся лёгкая — цель мандата
    # достигается без нарушения never: self-walk-the-tree.
    # Позиция в списке остаётся порядком ЗАМЕН при недоступности; вид работы решает
    # раньше — какой лейн вообще уместен.
    # v25 (решение владельца 2026-07-21): БЕСПЛАТНЫЙ ПУЛ ВПЕРЕДИ. Оба лейна
    # Google-пула идут ДО haiku и до платных: квота там практически не исчерпаема,
    # а дефицитен ровно Claude-window. Оба доказали планку на самом трудном тире
    # (recon t3, 601 файл: gemini-flash 450/450, agy-opus 450/450 — файлы ответов
    # побайтово идентичны). Внутри головы — ротация, чтобы не выбирать один и тот же.
    scout:
      - equal: [gemini-flash, agy-opus]   # v27: было gemini-recon-cheap, слит в gemini-flash
      - haiku
      - codex-recon
      - grok-build
      - lead-inline
    # v23 (решение владельца 2026-07-21): равный пул — те же четыре, что в critic.
    # Пятым рассматривался Gemini 3.1 Pro и был снят владельцем в тот же день
    # (см. запись на месте лейна gemini-spec-lens). Вендорный фильтр независимости
    # на эту ось теперь распространяется — см. independence_filter.
    # (v20: цепочки у этой линзы не было вовсе.)
    spec-lens:
      # v25 (решение владельца 2026-07-21): БЕСПЛАТНЫЙ ПУЛ ВПЕРЕДИ, как и у scout.
      # Оси не нужны живые инструменты — она сверяет деливерабл со спекой, поэтому
      # ограничений на лейны Google-пула здесь нет вовсе.
      - equal: [gemini-flash, agy-opus]         # квота не дефицитна -> первыми (v27: было gemini-critic)
      - equal: [opus, sol, grok-4.5, kimi-k3]   # дефицитные/платные — вторым эшелоном
      - report-blocker
    # Кросс-провайдерные лейны:
    codex-critic:      [codex-critic, grok-4.5, kimi-k3, skip-third-lens]   # gemini убран (v19-блок)
    codex-code:        [codex-code, builder, grok-build, kimi-k3]
    codex-recon:       [codex-recon, builder, grok-build]       # нужен shell
    grok-build:        [grok-build, codex-code, sonnet, kimi-k3]
    composer-build:    [composer-build, codex-code, sonnet]
    kimi-k3:           [kimi-k3, sonnet, codex-code, grok-build]
    # v27 (срез 2, ADR-0005 §5): три прежних ключа (gemini-recon [gemini-recon,
    # codex-recon, builder]; gemini-recon-cheap [gemini-recon-cheap, codex-recon,
    # scout]; gemini-pro-recon [gemini-pro-recon, kimi-k3, codex-recon, builder]) —
    # один и тот же лейн под тремя именами — слиты в ОДНУ цепочку gemini-flash: союз
    # прежних кросс-провайдерных продолжений (codex-recon, kimi-k3, builder).
    # ТОЧНОСТЬ (crit-config Notable #1): прежняя gemini-recon-cheap имела в хвосте ещё
    # терминал scout — он здесь опущен НАМЕРЕННО, а не «ничего не потеряно»: scout-side
    # guidance (never/delivery) живёт в комментарии роли scout, а сама роль scout несёт
    # собственную цепочку с Claude-полами (haiku, lead-inline). Дублировать scout-хвост
    # в кросс-провайдерной цепочке gemini-flash не требуется.
    # scout своей роли не лишается — её собственная равная голова (scout: выше)
    # по-прежнему первой пробует gemini-flash независимо от этой цепочки.
    gemini-flash:      [gemini-flash, codex-recon, kimi-k3, builder]
    # Ось Standards фиксированного гейта: gemini УБРАН (заблокирован v19), заменён
    # честными критик-eligible. Терминал sonnet-inline-note (гейт-ось пропущена быть
    # не может, в отличие от codex-critic ad hoc, что легитимно кончается skip-third-lens).
    # v23 (решение владельца 2026-07-21): РАВНЫЙ ПУЛ из трёх — Sol (лейн codex-critic),
    # Grok и Kimi; при недоступности всех трёх ось исполняет sonnet инлайн с пометкой в
    # отчёте. Прежний порядок выражал не силу, а роль оси (не-Claude читатель по
    # построению) — с равными весами это свойство СОХРАНЯЕТСЯ: все три внешние, и
    # терминал остаётся единственным Claude-исполнителем, причём с раскрытием.
    # Gemini в пул НЕ включён (владелец назвал три лейна); вопрос его возврата на эту
    # ось остаётся открытым — см. рамку про транспорт agy выше.
    # Фильтр независимости применяется ДО ротации (не судить деливерабл своего вендора).
    standards-lens:
      # v23: четвёртым добавлен gemini-critic (Gemini 3.6 Flash High), решение владельца
      # 2026-07-21 — тем же заходом, что и на двух других судейских осях. Живые
      # инструменты оси не нужны: она читает деливерабл против правил репозитория.
      # v25: gemini ВОЗВРАЩЁН. agy-opus сюда НЕ ставится: ось требует НЕ-Claude
      # читателя по построению, а вендор той модели — Anthropic (квота Google этого
      # не меняет). Ровно тот случай, ради которого вендор и поверхность разведены.
      - equal: [gemini-flash, codex-critic, grok-4.5, kimi-k3]   # v27: было gemini-critic
      - sonnet-inline-note

  # v23: КАК выбирать внутри элемента `equal: [...]`. Без этого блока «равные веса»
  # были бы прозой, а проза в этом файле трижды не исполнялась (см. v21).
  equal_weight_selection:
    # Правило: среди кандидатов, ОСТАВШИХСЯ после фильтров ниже, взять тот, что
    # в этом прогоне диспетчился РЕЖЕ всех. Счётчик ведёт ОТДЕЛЬНЫЙ дисптч-леджер
    # tools/dispatch_ledger.py (append-only telemetry/dispatch-ledger.jsonl, ключ —
    # run_id), а НЕ чтение из routing-log. Причина (ратифицировано владельцем
    # 2026-07-22): routing-log рождается на ЗАВЕРШЕНИИ воркера, а веер билдеров
    # раздаётся ДО первого возврата — читатель routing-log увидел бы одни нули и
    # схлопнул ротацию именно на веере. Механизм — атомарный `claim` (выбрать
    # наименее-разданного И тут же записать одним вызовом): лид ОБЯЗАН звать
    # dispatch_ledger claim для любого equal-пула, не глазомером. Так «равные веса»
    # дают ровный расход квоты; ротация самовосстанавливается, если участник выпал.
    rule: least-dispatched-this-run
    tiebreak: written-order      # при равных счётчиках — порядок имён в `equal`;
                                 # ДЕТЕРМИНИРОВАННО, иначе прогон невоспроизводим
                                 # и resume-pack (v20) перестаёт сходиться
    counter_scope: run           # как у breaker: между прогонами счётчик НЕ несётся
    # Порядок применения — фильтры СНАЧАЛА, ротация ПОСЛЕ (иначе ротация могла бы
    # «выбрать» кандидата, которого правило независимости обязано снять):
    applied_after: [breaker, independence_filter]
    # Единственное, что бьёт ротацию: явная срочность тикета (полный путь —
    # cross_provider.latency_sensitive.applies_when). Тогда из пула берётся самый
    # быстрый лейн (grok-4.5), а не очередной по счётчику. Это тайбрейк по
    # скорости среди РАВНЫХ по качеству — не понижение тира.
    latency_override: cross_provider.latency_sensitive
    # Телеметрия: выбор из пула — это МАРШРУТ, а не отказ. fallback_from/
    # fallback_reason НЕ штампуются (иначе метрика квотного давления наполнится
    # штатными ротациями и перестанет что-либо значить); причина едет в
    # xprovider_reason: quota-spread — словарь §7 уже её содержит.
    telemetry: xprovider_reason=quota-spread; never fallback_from

  # Фильтр НЕЗАВИСИМОСТИ (поверх цепочек critic, standards и — с v23 — spec):
  # пропустить элемент, чей провайдер совпадает с провайдером ПРОДЮСЕРА деливерабла
  # (self-preference, ADR-0001). Для critic — всегда; для standards и spec — пока
  # есть кандидаты.
  # v23: spec ДОБАВЛЕНА. Она была единственной судейской осью без вендорного правила
  # (продюсер≠грейдер соблюдался, а «не свой вендор» — нет), и в самом частом раскладе
  # это давало Anthropic, проверяющую работу Anthropic: пишет sonnet, «то ли сделано»
  # решает opus. Дыра открылась вместе с пулом: пока исполнитель был жёстко пинован
  # одной моделью, выбирать было не из чего, и правило нечего было применять.
  independence_filter: skip-producer-vendor

  # v27 (срез 1, ADR-0005 §4 «одно каноническое имя + словарь алиасов»): единственное
  # место, где алиас усилия/модели резолвится в свой канонический лейн. Судейские
  # цепочки выше называют исполнителя алиасом (sol-xhigh, grok-4.5), не именем лейна
  # cross_provider.lanes (codex-critic, grok-build) — раньше это заставляло
  # provider_map/surface_map хранить ОБЕ формы (14ce9fe, v26: «дыра independence_
  # filter закрыта ценой легитимизации разнобоя» — см. ADR-0005 §«Что уже сделано»).
  # Теперь карты ниже держат только канонические имена; tools/validate_config.py
  # резолвит алиас через этот словарь ПЕРЕД проверкой карт (map_completeness_
  # violations), так что второй записи для алиаса в картах не требуется.
  aliases:
    # v28 (ADR-0005 поправка B): sol-xhigh УДАЛЁН. После выделения эффорта в отдельный
    # флаг --effort он тождествен `sol` (оба -> codex-critic, эффорт задаётся флагом,
    # дефолт = эффорт лейна xhigh). architect-цепочка переведена sol-xhigh -> sol.
    sol: codex-critic          # Sol; эффорт из --effort (дефолт = эффорт лейна = xhigh)
    grok-4.5: grok-build       # имя модели лейна grok-build в судейских цепочках

  # Карта «провайдер -> его лейны/агенты». ЕДИНСТВЕННОЕ место, где принадлежность
  # выражена явно (раньше читалась из комментариев). Валидатор проверяет полноту.
  # v25: карта отвечает на вопрос «ЧЕЙ ЭТО ВЕНДОР» — им пользуется independence_filter
  # (не судить деливерабл своего вендора). Ключевой случай: agy-opus работает на квоте
  # Google, но модель — Anthropic, поэтому он ЗДЕСЬ, а не в google.
  # v27: sol-xhigh/grok-4.5 (v26) и gemini-recon/gemini-recon-cheap/gemini-pro-recon/
  # gemini-critic (слиты в gemini-flash, срез 2) убраны как отдельные записи — первые
  # резолвятся через aliases выше, вторые больше не существуют как отдельные лейны.
  # Значения ниже обязаны совпасть с полем vendor: на каждом лейне cross_provider.lanes.
  provider_map:
    anthropic: [architect, builder, scout, critic, opus, fable, sonnet, haiku, spec-lens, lead,
                agy-opus]
    openai:    [codex-critic, codex-code, codex-recon]
    xai:       [grok-build, composer-build]
    moonshot:  [kimi-k3]
    google:    [gemini-flash]

  # v25: ВТОРАЯ карта, отдельная от provider_map, — «ЧЬЯ ЭТО ПОВЕРХНОСТЬ И КВОТА».
  # Ею пользуется breaker: гаснут вместе те, кто делит подписку и транспорт, а не те,
  # кто делит вендора модели. Без этого разделения agy-opus считался бы то Claude-ом
  # для отказа квоты (неверно: его окно — Google), то не-Claude для независимости
  # (неверно и опасно: он Claude). Один лейн — два разных ответа на два разных вопроса.
  # v27: та же дедупликация, что у provider_map выше — значения обязаны совпасть с
  # полем surface: на каждом лейне cross_provider.lanes.
  surface_map:
    anthropic-subscription: [architect, builder, scout, critic, opus, fable, sonnet, haiku,
                             spec-lens, lead]
    google-antigravity:     [gemini-flash, agy-opus]
    openai-codex:           [codex-critic, codex-code, codex-recon]
    xai:                    [grok-build, composer-build]
    moonshot:               [kimi-k3]

  # Предохранитель по провайдеру (§1 проекта). Run-scoped, ведёт лид на естественных
  # точках (диспетч / возврат воркера / граница волны) — НЕ демон.
  breaker:
    hard_open: [quota-window, subscription, connector-absent, hardening-gate]  # валят с 1 события
    soft_open:                                        # мягкие — требуют подтверждения
      signals: [connector-error, timeout]
      threshold_failures: 2
      distinct_dispatches_required: 2                 # 2 отказа на РАЗНЫХ тикетах/лейнах, не на одном
    not_signals: [quality-fail, needs-clarification, safety-classifier-block]  # НЕ в счётчик
    on_open: reroute-pending-proactively              # выигрыш: не N таймаутов, а один
    probe:                                            # воскрешение
      at: wave-boundary
      lane: cheapest-of-provider                      # канарейка (luna-low/grok-low/kimi-low/flash-low/haiku)
      budget_per_run: 2
      first_ticket_back: non-gate-only                # полуживой транспорт -> ложный PASS; в гейт не пускать
    second_open: written-off-for-run                  # мигающий хуже мёртвого
    cross_run: telemetry-prior-not-counter-carry      # НЕ Orca-перенос счётчика: прогоны разделены
                                                      # часами; вместо этого прайор из телеметрии 24ч +
                                                      # обязательная канарейка до первого боевого диспетча

  # Протокол падения НА ЛЕТУ (§3). Смерть транспорта != провал качества.
  midflight:
    death_evidence: [nonzero-transport-exit, transport-error-ok-false, empty-or-truncated-stream, timeout-no-output, sudden-login-prompt]
    ambiguity_resolves_to: quality                    # сомнение -> дорога качества (не лазейка для ретраев)
    redispatch:
      max_per_ticket: 2                               # свой предел, ОТДЕЛЬНЫЙ от max_attempts_per_subtask
      fresh_worktree: required
      stale_base_recheck: required
      salvage: attach-as-untrusted-input             # дифф покойника — справка, не база
      salvage_as_base: named-lead-decision-only       # только если прошёл скоуп-проверки целиком
    wave:
      completed_reports: valid                        # гейт судит артефакт, а не здоровье провайдера
      whole_diff_review: waits-for-replacements

  # Особый случай Claude (§4). Граница: жив ли лид как сессия.
  lead:
    invariant: session-model-only                     # см. never_shift; аварийного чужого лида нет
    quota_forecast:                                   # A': смерть по квоте предсказуема — не врезаться
      at: wave-boundary
      on_shortfall: stop-dispatch-finish-gates-report # остатка не хватит на волну+гейты+синтез -> плановый стоп
    resume_pack:                                      # B: полный выпад -> прогон резюмируем
      when: after-each-wave
      path: telemetry/run-state/                      # слепок: фронтир, летящие тикеты, worktree, здоровье, config
    emergency_foreign_lead: forbidden                 # чужой харнесс в роли мозга не аттестован
    custodian_mode: disabled                          # владелец 2026-07-19: строгая пауза, без не-Claude активности

  # Словарь причин для fallback_reason (телеметрия). v20: +provider-degraded (проактивный
  # переброс по открытому предохранителю), +hardening-gate (fail-closed песочница не применилась).
  reasons: [quota-window, subscription, connector-absent, connector-error, provider-degraded, hardening-gate]

# -----------------------------------------------------------------------------
# Пороги перекалибровки (quality.md §5, §7). Начальные догадки — правь по данным.
# -----------------------------------------------------------------------------
thresholds:
  first_try_pass_min: 0.80         # ниже — тикеты недоспецифицированы: чини тикеты, не воркеров
  recalibrate_after_records_per_tier: 20   # накопил тир столько записей -> ревизия рубрики
  critic_fail_rate_review_below: 0.05      # стабильно ниже — гейт, возможно, переприменяется
  incident_review_signal: 2        # >= N инцидентов одного класса -> сигнал ревизии правила (§8)

# -----------------------------------------------------------------------------
# Бюджет прогона (v15; вынесен из candidates ниже). Верхний контур поверх
# пер-тикетных ограничителей (review_loop.full_rounds_max, proportionality_stop,
# gates.pre_gate.max_diff_lines): те держат петли внутри тикета, этот — прогон
# целиком. Родился из того же инцидента 2026-07-17: ночь без внешнего бюджета
# дала циклу крутиться до 4х объёма всего сделанного ранее.
# -----------------------------------------------------------------------------
session_budget:
  # Кумулятивные токены прогона по записям §7 (input+output всех делегированных
  # тикетов и линз). v21: сумму считает tools/telemetry_append.py при каждой
  # записи строки журнала (и по требованию: --check-only --task/--run-id);
  # прежняя формула «лид сверяет механически, без инструмента» не пережила
  # первый живой прогон (v17, 2026-07-18: 3.9M/3M пост-фактум). Заявленный
  # заранее больший потолок конкретного прогона — флаг --tokens-max
  # (аналог override: ticket-declared-only у max_diff_lines).
  # Начальная догадка — правь по данным (§5).
  tokens_max: 3000000
  # При пересечении: новые тикеты не диспетчатся; уже летящие доводятся до своих
  # гейтов; остаток фронтира — в финальный отчёт как несделанное, с состоянием
  # трекера, чтобы свежий прогон продолжил с места остановки. Переопределение —
  # именованное решение лида с причиной в телеметрии, никогда молча.
  on_exceed: stop-dispatch-finish-gates-report

# -----------------------------------------------------------------------------
# Телеметрия (quality.md §7).
# -----------------------------------------------------------------------------
telemetry:
  log: telemetry/routing-log.jsonl    # v21: писать ТОЛЬКО через tools/telemetry_append.py
                                      # (исполняемый §7-словарь + бюджетный предохранитель);
                                      # строка дописывается в момент приёмки тикета
  entry_values: [full, frontier]      # v22, ADR-0004: словарь входов для сравнения
                                      # first-try успеха между полным и фронтирным входом
  entry_requires_shape:               # v22: какой вход какую форму требует. Ключ здесь,
    frontier: сборка                  # а не в коде: фронтир существует только там, где
                                      # тикеты нарезаны, и расширение оси не требует правки
                                      # инструмента (правило нулевого дублирования ADR-0004)
  require_entry_on_append: true       # v22: поле entry ОБЯЗАТЕЛЬНО у новых записей.
                                      # Старые записи журнала законно его не имеют и
                                      # читаются как full — но пропуск в НОВОЙ записи
                                      # молча зачисляет фронтирный прогон в full и
                                      # ломает сравнение, ради которого поле заведено
                                      # (находка критика 2026-07-19: инвариант, живущий
                                      # в прозе, проигрывает — как трижды до этого)
  stamp_records_with_config: true  # поле config: "v<version>+<sha256:7>" в каждой записи
  snapshot_dir: telemetry/config-snapshots
  provider_health_events: telemetry/routing-log.jsonl  # v20: события provider_health в тот же
                                                       # поток (без поля verdict -> старые
                                                       # потребители игнорируют). Поля: provider,
                                                       # transport, state, trigger, evidence,
                                                       # failed_dispatches, probe_lane, run_id.
                                                       # Пер-тикет: +fallback_reason(provider-degraded/
                                                       # hardening-gate), +redispatch_of/redispatch_no
                                                       # (отдельно от retries), +salvage, +run_id.

# -----------------------------------------------------------------------------
# Кандидаты на будущие ручки — пока живут в прозе или не параметризованы вовсе.
# Раздел — карта того, что ЕЩЁ можно вынести сюда; вынос кандидата = бамп version
# + правка соответствующей прозы (значение из прозы убирается, остаётся ссылка).
# -----------------------------------------------------------------------------
# candidates:
#   grill_depth_matrix:     таблица «тир x неоднозначность» глубины грилла (Step 0.5)
#   approval_checkpoint:    условия чекпойнта одобрения плана до первой волны (Step 1)
#   effort_per_class:       reasoning-эффорт воркеров по классам тикетов (сейчас — во
#                           фронтматтере агентов и пинах лейнов; сводная ручка возможна)
#   scout_two_angle:        обязательность двух ракурсов инвентаризации (v2.11 — сейчас
#                           правило прозы delegation.md; можно сделать переключаемым)
#   team_channel:           триггеры/лимиты экспериментального канала teams (teams.md;
#                           пока под флагом окружения и собственным пилотом)
#   verdict_vocabulary:     словарь вердиктов телеметрии (quality.md §7) — сознательно
#                           НЕ ручка: словарь должен быть стабильным, чтобы записи
#                           разных недель оставались сравнимыми
