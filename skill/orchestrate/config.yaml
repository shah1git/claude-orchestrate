# =============================================================================
# /orchestrate — операционный конфиг маршрутизации (введён в v2.12)
# =============================================================================
# Этот файл — ЕДИНСТВЕННЫЙ источник истины для перечисленных здесь настроек.
# Проза скилла (SKILL.md, references/*) хранит метод и обоснования; значения —
# здесь. При конфликте прозы и конфига побеждает конфиг.
#
# Правила редактирования (для человека и для лида):
#   1. Правь смело — файл для этого и существует. Лид перечитывает его при
#      каждом запуске оркестрации (SKILL.md, раздел «Config»).
#   2. При содержательной правке подними `version` на единицу. Забытый бамп
#      не страшен: телеметрия штампует записи отпечатком v<version>+<sha256:7>,
#      и хеш выдаст незабампленную правку.
#   3. Новую МОДЕЛЬ в cross_provider не пиновать, пока она не проверена живьём
#      по каталогу коннектора (правило «pin only what the connector exposes»,
#      references/cross-provider.md). Если конфиг опережает баннер верификации —
#      сначала проверка, потом первый маршрутизированный вызов.
#   4. Модели/эффорты четырёх Claude-агентов здесь НЕ дублируются: их источник
#      истины — фронтматтер agents/*.md (architect=fable/xhigh, builder=
#      sonnet/high, scout=haiku, critic=opus/xhigh) — это точка, где пины
#      реально исполняются харнессом. Меняешь их — меняй там.
#
# Провенанс: каждая запись routing-log.jsonl несёт поле config с отпечатком
# этого файла на момент диспетча; при первом появлении нового отпечатка лид
# кладёт полную копию в telemetry/config-snapshots/<отпечаток>.yaml.
# Так любая строка журнала разворачивается в точный конфиг, её породивший.
# =============================================================================

version: 25
# v25 (2026-07-21, поздний вечер): СНЯТИЕ GEMINI (v24) ОТМЕНЕНО — оно стояло на
#      ошибке ИЗМЕРЕНИЯ, а не на данных. Модели сохраняли ответ ФАЙЛОМ, а грейдился
#      их пересказ в печати, где вывод усекается. По файлам с диска: gemini-flash
#      450/450 и claude-opus-4.6 450/450 на recon t3 (601 файл), файлы ответов
#      побайтово идентичны; диагностика t3/t4/t5 — 3/3; калибровочная разведка 48/48.
#      Ни одного провала. Отсюда правило (4) в рамке над gemini-лейнами: АРТЕФАКТ
#      ПРИНИМАЕТСЯ С ДИСКА. Три подряд неверных вывода за вечер («выдумывает цитаты»,
#      «канал портит дословность», «длинные перечисления невозможны») — следствие
#      измерения не того артефакта; урок записан, чтобы не повторять.
#      ЧТО ДОБАВЛЕНО. Лейн agy-opus (claude-opus-4-6-thinking) — фронтир-Claude на
#      квоте Google; законно, потому что запускается официальный CLI Google под
#      аккаунтом владельца, а модели Claude там лицензированы самим Google.
#      Плюс алиас gemini-flash. Размещение (решение владельца «использовать оба на
#      максималках»): architect и critic — в пулы; builder — agy-opus в пул (самая
#      объёмная роль уходит с дефицитного окна); scout и spec-lens — БЕСПЛАТНЫЙ ПУЛ
#      ВПЕРЕДИ haiku и платных лейнов; standards-lens — только gemini (agy-opus туда
#      нельзя: ось требует не-Claude по построению).
#      РАЗВЕДЕНЫ ДВЕ ПРИНАДЛЕЖНОСТИ: provider_map = вендор МОДЕЛИ (для independence:
#      кто кого судит), новый surface_map = поверхность и КВОТА (для breaker: что
#      гаснет вместе). agy-opus — anthropic по вендору и google-antigravity по
#      поверхности; без этого различия страж независимости пропустил бы Claude,
#      судящего работу Claude, приняв его за «не-Claude лейн Google».
