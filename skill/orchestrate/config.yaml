# -----------------------------------------------------------------------------
# Форма работы (SKILL.md Step 0). Наследует роль оси профилей ставок (v3–v9),
# упразднённой ADR-0002 (docs/adr/0002-pocock-spine-unconditional.md) и
# разрешённой спекой #4 (issue #4): цена — легитимный аргумент только на слое
# Исполнителя, глубину проверки ценой больше не масштабируем — гейт фиксируется
# тремя линзами безусловно (config gates:, срез 3 — issue #7, здесь не тронут).
# shape: решает не ГЛУБИНУ проверки, а ПОСЛЕДОВАТЕЛЬНОСТЬ шагов: нужны ли спека
# и нарезка на тикеты перед фронтиром, или работа идёт сразу в разбирательство.
# Критерий развилки — разваливается ли работа на вертикальные срезы, а не
# важность, риск или размер в строках; размер задачи (таблица триажа Step 0)
# отдельно управляет ШИРИНОЙ веера, как и раньше. Профиль low не существует:
# критерий входа ADR-0002 («я не отдам простую задачу в оркестратор; если я
# отдаю задачу — значит там есть над чем подумать», владелец, 2026-07-15;
# орфография и пунктуация нормализованы) исключает класс задач, который low
# описывал, — тривиальное сюда не приезжает по построению.
# -----------------------------------------------------------------------------
shape:
  values:
    сборка:                  # assembly — работа разваливается на вертикальные срезы
      criterion: work splits into vertical slices (spec, then tickets with blocking edges)
      sequence: grill (lead-opened, owner-answered) -> spec (to-spec) -> tickets (to-tickets) -> frontier
    разбирательство:         # investigation — одна нитка, резать нечего
      criterion: one thread, nothing to cut into slices
      sequence: straight to work; no spec, no tickets; Step 0.5 clarification rules apply unchanged

# -----------------------------------------------------------------------------
# Маршрутизация: класс подзадачи -> агент (SKILL.md Step 2).
# Классифицируй КАЖДУЮ подзадачу до маршрутизации; достаточно одного сигнала.
# -----------------------------------------------------------------------------
routing:
  # При сомнении между двумя классами — маршрутизируй ВВЕРХ: up-route стоит
  # немного квоты, down-route даёт уверенную тихую ошибку (дороже в итоге).
  tie_break: up

  classes:
    judgment:                    # -> architect (Fable) или critic (Opus), никогда ниже
      route: [architect, critic]
      signals:
        - open design space
        - ambiguity left to resolve
        - security implications
        - unknown root cause
        - conflicting constraints to weigh
        - quality assessment of meaning (audits/reviews of prose, design, policy, architecture)
        - an error would silently mislead the lead
    skilled:                     # -> builder (Sonnet)
      route: [builder]
      signals:
        - complete spec exists
        - success is objectively checkable (tests, criteria)
        - known patterns apply
        - bounded blast radius
    mechanical:                  # -> scout (Haiku); только read-only, без суждений
      route: [scout]
      signals:
        - every step enumerable in advance
        - zero decisions remain
        - exact output format given
        - a wrong result is detectable on sight
      # v13: порог размера. Дешёвые тиры (Haiku, Luna) на больших инвентаризациях
      # дают честные ошибки счёта (полигон t3=38: haiku 0.868, luna 0.921 — ниже
      # планки 0.95; t1=25/t2=17 — 1.0). Инвентаризация от N элементов (или обход
      # >N файлов) маршрутизируется на тир выше (sonnet / codex-code / grok-build
      # пилот). Порог — оценка по одной точке (t3 провал / t1 успех между 25 и 38);
      # перекалибровать по телеметрии, не хардкодить как истину.
      large_inventory_route_up_from: 32   # ориентир: элементов ожидаемого вывода

  # Жёсткие полы: никогда не ниже Opus, независимо от квоты.
  hard_floors:
    - architecture and technology decisions
    - risky-change planning
    - root-cause debugging
    - security-relevant work
    - final verification of production code
    - judgment-bearing review/audit lenses

  escalation:
    # Лестница на FAIL: ① ретрай тем же агентом с находками критика ->
    # ② тир вверх (свежий контекст) -> ③ блокер-отчёт пользователю.
    ladder: [retry-same-agent, escalate-tier, report-blocker]
    # v7 (гайд команды Claude Code, 2026-07-07): перед тратой ступени ① —
    # диагноз провала. «Не старался» (пропустил файл, не прогнал тесты,
    # бросил на полпути) -> ретрай тем же тиром; если effort воркера был
    # пинован ниже дефолта — поднять. «Не знал» (полный контекст, честная
    # попытка, уверенно неправ) -> ступень ① пропускается, сразу тир вверх:
    # ретрай того же тира на capability-провале — потерянная попытка по
    # построению. Экономика той же статьи подтверждает tie_break: up —
    # на действительно трудной задаче старшая модель достигает планки за
    # меньшее число шагов и выходит ДЕШЕВЛЕ за задачу, несмотря на цену токена.
    failure_diagnosis: effort-vs-capability
    max_attempts_per_subtask: 2    # третий провал = блокер-отчёт, не ретрай
    tiers: [haiku, sonnet, opus, fable]
    one_way: true                  # упавшая наверх подзадача вниз не возвращается

  overrides:
    # model-параметр Agent-вызова поверх фронтматтера: вверх — всегда можно.
    up_routing: always-allowed
    # Потолок up-routing — model: fable; ровно два санкционированных применения
    # (v11: третье — «correctness lens of a highest-stakes dual-lens» — снято
    # вместе с упразднённым механизмом двойной линзы; ADR-0002, срез 3 — issue #7).
    fable_ceiling_uses:
      - architect (bound by design)
      - final escalation rung
    # Даунгрейд critic до sonnet — только при ВСЕХ трёх условиях сразу.
    critic_downgrade_requires_all:
      - deliverable is recon or an intermediate draft (not production code, not acted on directly)
      - deterministic checks exist and already passed
      - a missed defect is still caught downstream before the user relies on the result

# -----------------------------------------------------------------------------
# Веера и рабочее дерево (SKILL.md Step 3).
# -----------------------------------------------------------------------------
fan_out:
  healthy_default: [3, 5]          # типичный здоровый параллелизм
  workflow_preferred_from: 5       # >= N однотипных элементов -> Workflow-пайплайн
  # v16 (эпизод на маке 2026-07-17, волна Т3/#137): два писателя штатно делили одно
  # дерево (порог был 3) — дисциплина снапшотов защитила атрибуцию диффов, но НЕ
  # среду исполнения: тестовый прогон одного воркера видел незакоммиченные файлы
  # соседа («их тесты тоже зелёные в общем прогоне»). Повезло, что сосед был зелёным;
  # красный сосед дал бы ложный вердикт детерминированного гейта — гонка, которую
  # ревью пост-фактум не ловит. Порог 3 был экономией времён дорогого worktree;
  # цена создания worktree сегодня копеечная, герметичность гейтов дороже.
  worktree_isolation_from_writers: 2   # >= N параллельных писателей -> worktree обязателен
  # v6 (разбор Orca orchestration, 2026-07-12): стражник свежести базы перед
  # диспетчем writer-волны — если чекаут/worktree отстал от базовой ветки
  # больше чем на N коммитов, сначала обнови базу (fetch + rebase или
  # пересоздание worktree), потом диспетчь. Переопределение — только явным
  # решением лида с причиной в телеметрии, никогда молча. Порог взят из
  # калибровки Orca: пропускает дневную скорость активного монорепо, ловит
  # чекаут, уехавший на сотни коммитов.
  stale_base_max_behind: 20

# -----------------------------------------------------------------------------
# Гейты качества (SKILL.md Step 4, quality.md).
# -----------------------------------------------------------------------------
gates:
  # Фиксированный гейт трёх линз (ADR-0002, спека #4, срез 3 — issue #7). Любой
  # принимаемый деливерабл проходит ОДНУ волну из трёх параллельных штатных линз —
  # не масштабируемых ни ценой, ни профилем, и без opt-in состава: dual_lens_triggers,
  # dual_lens_correctness_model и cross_model_third_lens (v3–v10 — двойная линза
  # высших ставок + opt-in кросс-модельная третья) упразднены вместе со всем
  # механизмом, который они переключали. Три линзы и их постоянный вопрос —
  # CONTEXT.md, термин «Линза»:
  #   Standards — хорошо ли сделано (документированные стандарты репо + двенадцать
  #     запахов Фаулера, гл. 3); чужой исполнитель против self-preference bias.
  #   Spec — то ли сделано и нет ли лишнего (сверка со спекой/тикетом, включая его
  #     Out of Scope — scope creep); поглощает прежнюю линзу полноты.
  #   критик — можно ли верить (перезапуск тестов, попытка опровергнуть); единственная
  #     линза с вердиктом PASS/FAIL — verdict: true у неё одной.
  # Правила адъюдикации находок (scope, blocking_scope, дельта-переверификация) не
  # входят в состав линз — они в review_loop ниже и не менялись с v8.
  #
  # executor: поле значит РАЗНОЕ у трёх линз — не единое понятие (находка гейта
  # среза 3, Sol, «Mysterious Name»). standards -> имя ЛЕЙНА из cross_provider.lanes
  # (модель/эффорт пинуются там, здесь только имя лейна). critic -> имя АГЕНТА:
  # у линзы есть свой agents/critic.md, и правило шапки этого файла №4 запрещает
  # дублировать здесь его model/effort — источник истины строго фронтматтер.
  # spec -> прямой пин МОДЕЛИ: у линзы нет собственного agents/*.md, конфиг —
  # законное (и единственное) место, где её исполнитель вообще пинуется.
  lenses:
    standards:
      question: is it well made — repo's documented coding standards + Fowler's twelve smells (ch. 3)
      executor: codex-critic     # cross_provider.lanes.codex-critic (закреплён с v3).
                                 # Доставка базы запахов в промпт и fallback-цепочка
                                 # исполнителя — срез 4, здесь не описывается.
    spec:
      question: is it the right thing, and nothing extra — matches the spec/ticket, including its Out of Scope (scope creep); absorbs the former completeness lens
      executor: opus              # прямой пин модели — у линзы нет agents/spec.md
    critic:                      # глоссарий CONTEXT.md называет линзу «критик»; ключ —
                                 # английский, как и везде в этом файле (routing.classes,
                                 # availability.fallbacks.critic) — тот же исполнитель.
      question: can it be trusted — re-runs tests, tries to refute the deliverable, PASS/FAIL verdict
      executor: critic            # агент; модель — во фронтматтере agents/critic.md
      verdict: true              # единственная линза, дающая вердикт гейта
  # v2.11: для UI-деливераблов живой прогон основного сценария — в детерминированном
  # гейте (реальные обработчики событий, не только зелёная сборка).
  ui_live_check: required
  # v2.11: негативная проба обязана удостоверять, КТО ответил (тело/заголовок),
  # а не только код статуса.
  probe_responder_identity: required
  # Ревью всего интегрированного диффа после волны из >= N писателей.
  whole_diff_review_from_writers: 2

  # v15 (2026-07-17, чужой инцидент как сигнал §8: ночной omp-прогон соседнего проекта —
  # тикет с планом 2–4k строк разросся до ~43k незакоммиченных строк; разбор показал
  # петлю «ревьюер вознаграждается за найденный пробел -> автор дописывает» без чьего-либо
  # права сказать «достаточно»). Наш детерминированный прегейт уже ограничивает дифф
  # ПО ПУТЯМ (quality.md §4: дифф только в названных тикетом файлах); этот блок добавляет
  # ограничение ПО ОБЪЁМУ — ноль LLM-токенов, срабатывает до критика. Объём для модели
  # бесплатен, поэтому объём — не сигнал усилия, а сигнал тревоги.
  pre_gate:
    # Потолок строк диффа на тикет: insertions + deletions по git diff --numstat против
    # пофайлового снапшота тикета (SKILL.md «Working-tree discipline»). Превышение —
    # детерминированный FAIL: возврат продюсеру с требованием нарезать по-трассирующему,
    # не вход в критика. Начальная догадка — правь по данным (§5): типичный трассирующий
    # тикет на порядок меньше потолка.
    max_diff_lines: 1200
    # Переопределение — ТОЛЬКО заранее: тикет сам объявляет ожидаемый объём в ACCEPTANCE
    # (законные случаи: wide-refactor батч, сгенерированный артефакт), лид фиксирует
    # именованное решение с причиной в телеметрии — тот же паттерн, что у
    # review_loop.proportionality_stop и fan_out.stale_base_max_behind. Пост-фактум
    # поднимать потолок под уже раздутый дифф запрещено: это ровно та лазейка,
    # которую потолок закрывает.
    override: ticket-declared-only

  # v8 (кейс a real project #21, 2026-07-12): контур ревью. Два корня: критик без семантики
  # документированных решений честно пере-судит закрытые вопросы (major-блокер на
  # задокументированном трейд-оффе + системном паттерне соседнего маршрута), а полные
  # раунды после каждой правки не сходятся — свежий контекст с установкой на recall
  # всегда находит новое. Метод и определения — quality.md §3a/§3b; промпт — agents/critic.md.
  review_loop:
    # Пакет контекста решений: индекс ADR + совпавшие термины CONTEXT.md + inline-маркеры
    # решений у затронутого кода, с провенансом base|added-by-diff. Собирается МЕХАНИЧЕСКИ
    # (scout по правилу включения из quality.md §3a; шелл не нужен — дифф-снапшот тикета и
    # затронутые файлы читаются Grep/Read). Продюсер пакет не собирает и не фильтрует
    # НИКОГДА (канал занижения строгости); лид может только ДОБАВЛЯТЬ записи.
    decision_context_pack: required-for-code   # каждый critic-гейт над кодом целевого репо
    pack_max_lines: 40                         # ссылки + однострочные цитаты, не транскрипты (принцип v5)
    # Ось скоупа находки — живёт в находках и note; словарь вердиктов телеметрии (§7)
    # НЕ трогается. Пропущенный scope читается как introduced (обратная совместимость).
    finding_scopes: [introduced, pre-existing, decision-challenge]
    blocking_scope: introduced                 # FAIL дают только introduced critical/major
                                               # (или проваленный критерий приёмки)
    # Экономика раундов: полный раунд = одна волна над деливераблом (все три линзы
    # параллельно = ОДИН раунд); дельта-переверификация принятых правок раундом не
    # считается и attempts лестницы не расходует. v8 ключевал потолок мёртвыми
    # профилями ставок (low: 0, standard: 1, high: 2); v11 — плоский потолок:
    # глубина проверки не масштабируется ни одной осью (ADR-0002), решение лида,
    # зафиксировано в телеметрии волны (срез 3 — issue #7).
    full_rounds_max: 2
    reverify: delta                            # после принятых правок — точечная проверка
                                               # named-находок и fix-hunks, не новый полный круг
    # Стоп по соразмерности: (токены гейтов + правок) / (токены продюсера) выше порога ->
    # оставшиеся находки в адъюдикацию и отчёт, не в новый раунд. Переопределение потолков
    # и стопа — явным решением лида с причиной в телеметрии, никогда молча (как у
    # fan_out.stale_base_max_behind). v11: тот же плоский потолок, что и у
    # full_rounds_max выше — тем же решением, той же причиной (ADR-0002).
    proportionality_stop: 2.0

# -----------------------------------------------------------------------------
# Кросс-провайдерные лейны (references/cross-provider.md).
# Постоянный мандат 2026-07-09: провайдер — решение лида; качество не сдвигается.
# Модели пиновать только проверенные по каталогу коннектора (правило 3 шапки).
# -----------------------------------------------------------------------------
cross_provider:
  enabled: auto-detect             # bridge --detect; нет поверхности -> Claude-дефолты

  # v4 (инцидент #6, 2026-07-12): стейджинг/рабочая область внешнего исполнителя
  # содержит ТОЛЬКО INPUTS его тикета — никогда соседние директории с выводами
  # других агентов. Для codex-лейнов: --cwd указывает на минимальную директорию
  # с INPUTS (или выделенный worktree), не на корень рабочей области. Барьер
  # структурный, а не поведенческий: Flash выдал найденный в соседней папке
  # результат Opus за свой — полагаться на добросовестность лейна нельзя,
  # ограничивается то, что лейн ВИДИТ (та же логика, что diff-с-диска у Codex).
  staging_inputs_only: required

  # v5 (кейс omp, 2026-07-12): доступ к внешним провайдерам — через OAuth-подписки
  # официальных CLI (codex login <- план ChatGPT/Codex; gemini/agy <- Google-аккаунт),
  # не через пометражные API-ключи: нулевая предельная стоимость уже оплаченных
  # подписок, отдельные от API квотные окна (в этом весь смысл спреда), токены
  # держит и обновляет вендорский CLI — в нашем конфиге нечему протекать. API-ключ —
  # только осознанное исключение решением владельца с записью причины в телеметрию.
  # Протухший логин = fallback_reason connector-error/subscription и просьба к
  # владельцу перелогиниться — не тихий переход на ключ. Будущие коннекторы
  # (например, Grok Build) подключаются по тому же правилу.
  auth: subscription-oauth-first

  lanes:
    codex-critic:                  # кросс-модельная линза (зеркало Opus-xhigh критика)
      model: gpt-5.6-sol
      effort: xhigh                # `max` — по решению лида для труднейших вердиктов
      sandbox: read-only
    codex-code:                    # кодинг-рука (зеркало builder/Sonnet-high)
      model: gpt-5.6-terra
      effort: high
      escalation: [terra-xhigh, sol-high, sol-xhigh]
      sandbox: workspace-write     # cwd = выделенный worktree; никогда danger-full-access
    codex-recon:                   # дешёвая репо-разведка С shell (read-only)
      model: gpt-5.6-luna
      effort: medium
      bulk_effort: low
      sandbox: read-only
    grok-build:                    # v18: продвинут из пилота в полноценный лейн (ключ
                                   # исторический — теперь роли шире сборки, см. roles).
                                   # Решение владельца 2026-07-19 на данных: architect t3/t4/t5
                                   # (root-cause, кросс-модуль с приманкой, два гасящих бага со
                                   # сверкой величины) — FULL наравне с Opus/Fable/Sol; тест на
                                   # честность пройден (вынес FAIL по красным тестам, файлы не
                                   # тронул, хотя мог). Самый быстрый лейн.
      model: grok-4.5
      effort: high                 # high/medium/low; low для рутинной механики
      sandbox: orchestrate         # v17: fail-closed профиль (extends strict + deny),
                                   # references/grok/; worktree ОБЯЗАТЕЛЕН.
      hardening: grok_hardening    # v17: обязателен перед диспетчем
      roles: [builder, recon, diagnosis, standards-lens, spec-lens, critic]
      # v18: never_critic СНЯТ (был: METR reward-hacking). Оговорки к креслу критика:
      #  (а) self-preference guard — grok НЕ судит деливерабл своего вендора (grok);
      #  (б) METR-запись серьёзна и снята ОДНОЙ пробой — честность отслеживаем: каждый
      #      вердикт критика сверяется детерминированным прегейтом (PASS на красных
      #      проверках всплыл бы сразу). Пересмотреть при первом сигнале нечестности.
      critic_eligible: honesty-cleared-2026-07-19
      prefer_for: latency-sensitive   # быстрый оборот сборки/разведки без ultra-цены Codex
    composer-build:                # ПИЛОТ дешёвого исполнителя (v14; см. pilots ниже)
      model: grok-composer-2.5-fast
                                   # reasoning-effort НЕ поддерживает (быстрая кодовая модель)
      sandbox: orchestrate         # v17: тот же кастомный fail-closed профиль (см. grok-build)
      never_critic: true
      spell_out_conventions: true  # v14: t1-провал — угадал не тот порядок кодов; в тикет
                                   # Composer конвенции (порядок кодов/полей) писать ЯВНО
      hardening: grok_hardening    # v17
      # composer НЕ critic_eligible: на честность/суждение не тестировался (дешёвый
      # быстрый кодер, не k3). never_critic остаётся до отдельной проверки.
    kimi-k3:                       # v18: новый лейн — Moonshot Kimi Code CLI, модель k3,
                                   # контекст 1M, подписка Allegretto (OAuth). Решение
                                   # владельца 2026-07-19 на данных: architect t3/t4/t5 FULL
                                   # наравне с Opus + тест честности пройден.
      model: k3
      effort: high                 # low|high|max (default max)
      transport: kimi-cli-headless # `kimi -p` (немодифиц. официальный CLI, ToS-совместимо),
                                   # драйвинг Orca-терминалом; НЕ через bridge (подписочный
                                   # токен нельзя переиспользовать — бан по ToS).
      hardening: kimi_hardening    # references/kimi/: telemetry=false + env-выключатели.
                                   # Своей ФС-песочницы НЕТ -> worktree + OS/контейнер-изоляция.
      roles: [builder, recon, diagnosis, standards-lens, spec-lens, critic]
      critic_eligible: honesty-cleared-2026-07-19   # self-preference guard: kimi не судит kimi
      client_data: never          # обучение на контенте без opt-out ([[kimi-k3]]) -> данные
                                   # клиентов (rika-crm/retailcrm) мимо Kimi
    # v19 (2026-07-19): ТРАНСПОРТ Gemini исправлен. Прямой `agy -p --model "<имя>"`
    # ЧЕСТНО учитывает модель в headless (проверено: agy валидирует имя — отверг
    # несуществующую модель, отработал «Gemini 3.1 Pro»). Это открывает и Flash, и
    # Pro на Google-квоте владельца. НЕ использовать: (а) обёртку gemini-mcp-tool —
    # она Flash-locked в print-режиме (игнорирует пин); (б) gemini-путь agent-bridge —
    # искажает промпт (старый баг). Команда лейна: agy -p "<промпт>" --model "<имя>"
    #   --print-timeout 5m  (в worktree; агент запускать с дозволенными инструментами).
    # Pro-контекст 2M — силён для глубокого ревью больших диффов.
    gemini-critic:                 # альтернативная кросс-линза (2M-контекст ревью)
      model: "Gemini 3.1 Pro (High)"
      transport: agy-print         # agy -p --model; НЕ mcp-обёртка (Flash-lock), НЕ bridge
    gemini-recon:                  # большой контекст / веб-разведка
      model: "Gemini 3.5 Flash (High)"
      transport: agy-print
    gemini-recon-cheap:            # высокообъёмная механика
      model: "Gemini 3.5 Flash (Low)"
      transport: agy-print
    gemini-pro-recon:              # v19: глубокая разведка/чтение в 2M-контексте (Pro)
      model: "Gemini 3.1 Pro (High)"
      transport: agy-print

  # v17 (аудит grok-build 2026-07-18, память grok-build-audit.md): обязательное
  # ужесточение обоих Grok-лейнов. Grok-CLI по умолчанию БЕЗ песочницы и с живым,
  # удалённо-включаемым каналом выгрузки в GCS xAI (untracked-файлы, .ssh/.pem/.env
  # НЕ исключены). Три уровня защиты + проверка; без применённой песочницы Grok не
  # диспетчить (fail-closed). Готовые файлы и обоснование — references/grok/.
  grok_hardening:
    config_file: references/grok/config.toml   # -> ~/.grok/config.toml (bootstrap ставит, если нет)
    sandbox_profile: orchestrate               # кастом extends strict + deny; наличие deny =>
                                               # обязательный bubblewrap => fail-closed
    # env спавнера лейна (дублируют config, переживают подмену файла):
    env:
      GROK_SANDBOX: orchestrate
      GROK_TELEMETRY_ENABLED: "0"
      GROK_TELEMETRY_TRACE_UPLOAD: "0"
      DISABLE_ERROR_REPORTING: "1"
      GROK_DISABLE_AUTOUPDATER: "1"
    # Проверка в раннере ПОСЛЕ старта лейна: без ProfileApplied — валить прогон.
    preflight_verify: "~/.grok/sandbox-events.jsonl содержит ProfileApplied; ApplyFailed / 'sandbox could not be applied' в stderr = FAIL"
    version_pin_target: "self-build 0.2.102 из открытого дерева (без вшитых точек выгрузки); до готовности — официальный бинарь, ужатый тремя уровнями (наружу только инференс); 0.2.101 вывести после пина"
    dispatch_gate: "нет применённой песочницы orchestrate -> Grok-лейн не диспетчить"

  # v18: ужесточение Kimi (аудит 2026-07-18, references/kimi/README.md). У Kimi нет
  # grok-подобной выгрузки репо, но телеметрия и авто-обновление включены по умолчанию,
  # а логин сам прописывает серверные search/fetch. Своей ФС-песочницы нет.
  kimi_hardening:
    config_file: references/kimi/config.toml   # telemetry=false -> ~/.kimi-code/config.toml
    env:                                       # спавнер лейна (не трогает интерактив владельца)
      KIMI_DISABLE_TELEMETRY: "1"
      KIMI_CODE_NO_AUTO_UPDATE: "1"
      KIMI_DISABLE_CRON: "1"
    isolation: "своей песочницы нет -> worktree + OS/контейнер (Orca); worktree НЕ барьер чтения"
    never_feedback: "/feedback не использовать — даже «Logs only» выгружает полный диалог"
    client_data_gate: "данные клиентов мимо Kimi (обучение без opt-out)"

  # Базовое распределение под quota-spread (Use 4): лейн -> дефолтный маршрут.
  # v3: спред — постоянная политика, а не режим «когда окно уже кончилось»:
  # при 3–4 параллельных проектах недельное окно Claude стабильно исчерпывается
  # за 1–2 дня до сброса; ждать исчерпания значит опоздать ровно на эти дни.
  defaults:
    web_recon: gemini-recon
    big_context_recon: gemini-recon
    inline_mechanical_sweeps: gemini-recon-cheap    # материал влезает в промпт
    shell_mechanical_sweeps: codex-recon            # нужен shell (у scout его нет)
    well_specified_builder_tickets: codex-code
    # v12 (срез 4, issue #8): постоянный маршрут Standards-оси фиксированного гейта —
    # не opt-in и не чередование (заменяет third_lens.alternate v3–v10: то чередование
    # обслуживало опциональную третью линзу, которой с v11 не существует). Fallback-
    # цепочка — availability.fallbacks.standards-lens, ниже в этом файле.
    standards_lens: codex-critic

  # Закреплённые лейны (v3, решение владельца 2026-07-12) — то самое «отдельное
  # решение пользователя», которым пилот v2 и должен был закрываться: три
  # codex-лейна переведены из пилота в закреплённые дефолты. Эмпирика — полигон
  # ролей 2026-07-11 (benchmark/RESULTS.md); мотив — квота (см. комментарий к
  # defaults выше). Качество не сдвинуто: never_shift ниже действует без
  # изменений, judgment-класс и первичный грейдер каждого гейта остаются Claude.
  promoted:
    codex-recon:   {evidence: "scout t1/t2 1.0/1.0, no sandbox violations", as: "shell recon + scout availability fallback"}
    codex-code:    {evidence: "builder t1 11/11 hidden, t2 15/15 char + 30/30 fixture, 0 oob", as: "well_specified_builder_tickets default + builder fallback"}
    codex-critic:  {evidence: "critic 8/8 planted defects, 0 FP, read-only clean", as: "preferred cross-model third lens (ahead of gemini-critic)"}

  # Пилоты кросс-лейнов: механизм сохранён для будущих лейнов (новый провайдер
  # проходит тот же путь: проверка по каталогу коннектора -> полигон ролей ->
  # пилот с реальным трафиком -> решение пользователя). Сейчас на пилоте никого.
  pilots:
    exit_after_records: 10           # порог решения по каждому будущему лейну
    promoted:
      grok-4.5: "v18 (2026-07-19, решение владельца на данных): ПРОДВИНУТ из пилота в полный лейн. architect t3/t4/t5 (root-cause; кросс-модуль с приманкой; два гасящих бага со сверкой величины) — FULL наравне с Opus/Fable/Sol. Тест честности пройден: как критик по красным тестам вынес FAIL, файлы не тронул, хотя мог писать. Роли: builder/recon/diagnosis/standards-lens/spec-lens/critic. Оговорки: self-preference guard (не судит grok), честность отслеживаем (METR-запись + одна проба), worktree+hardening обязательны, самый быстрый лейн."
      kimi-k3: "v18 (2026-07-19, решение владельца на данных): новый полный лейн. architect t3/t4/t5 — FULL наравне с Opus. Тест честности пройден (FAIL по красным тестам, файлы не тронул). recon: 1M-контекст полигоном не задействован (греппится), преимущества над haiku нет — брать не ради recon, а как фронтир-судью/билдера. Роли те же. Оговорки: self-preference guard, client_data мимо Kimi, worktree+OS-изоляция (своей песочницы нет), kimi_hardening."
    on_pilot:
      grok-build_superseded: "промоция см. promoted.grok-4.5 (v18); прежний пилотный статус v13 снят."
      composer-2.5: "v14 (пересмотр v13 по возражению владельца): scout все размеры 1.0; builder t1 FAIL (переставил коды DEP-101↔102 — порядок в спеке не задан явно, 4/5 угадали конвенцию), НО builder t2 PASS (47, чисто). Провал — не слабость логики, а промах вывода НЕЯВНЫХ конвенций. Пилот дешёвого исполнителя (scout крупной механики + builder) с ОГОВОРКОЙ: в тикетах Composer явно прописывать конвенции (порядок кодов/полей), не полагаться на угадывание. worktree (песочница Grok-CLI читает диск), never_critic. ≥10 записей до промоции."
    not_on_pilot:
      gemini-recon-cheap: "scout t2 passed only via ask-gemini MCP inlined; bridge path unreliable — keep as fallback, not promoted"
    # v9 (ре-тест 2026-07-12, benchmark/results/2026-07-12-gemini-retest): gemini-critic
    # СНЯТ с not_on_pilot — прошлые 2/2 промаха были свойством транспорта, не модели
    # (Gemini прошла задачи на обоих путях). Рабочий путь линзы — ask-gemini MCP, НО он
    # Flash-locked в print-mode: заявлять «3.1 Pro-линзу» через него нельзя (pin only what
    # connector exposes). Нативный agy honores модель, но не промотирован: требует ручных
    # permission-подтверждений (не headless) + --sandbox → find / → контаминация соседа
    # (живой инцидент #6, incidents.md). Проза — references/cross-provider.md, Use 1.

  # Что НЕ сдвигается мандатом никогда (качество — инвариант, квота — нет):
  never_shift:
    - the lead itself stays the session model (orchestration judgment)
    # v18: было «primary grader = Claude critic». Снято по решению владельца на данных
    # (grok-4.5, kimi-k3 прошли тест честности + t3/t4/t5 FULL). Теперь инвариант —
    # не «вендор грейдера», а ЧЕСТНОСТЬ и НЕЗАВИСИМОСТЬ:
    - every gated deliverable is graded by a critic that (a) did NOT build it and
      (b) is NOT the deliverable's own vendor — self-preference guard, ADR-0001;
      grader may be any honesty-cleared lane (opus, critic, sol, grok-4.5, kimi-k3)
    - Fable stays the DEFAULT for judgment-class (architect), not the only option
    - local repo file-walking recon defaults to scout (economics)
    - the escalation ladder (failed cross-provider ticket escalates to its default)

  ultra_policy:
    critic_lanes: never            # суб-агенты той же модели покупают стоимость, не независимость
    builder_condition: genuinely hard AND latency-sensitive
    log_reason: required           # effort: ultra в телеметрии с записанной причиной

  # v18: скорость Grok как сигнал маршрутизации (полигон 2026-07-19: grok-4.5
  # стабильно самый быстрый при полном качестве). Раньше «трудно И срочно» покрывал
  # только дорогой Codex-ultra; теперь у срочного есть дешёвый быстрый маршрут.
  latency_sensitive:
    # ЧТО СЧИТАЕТСЯ срочным (иначе «скорость» — пустой вибрирующий ярлык). Уменьшение
    # wall-clock ЭТОГО тикета сокращает ожидание — истинно ТОЛЬКО когда:
    applies_when:
      - human-blocking: владелец ждёт результат вживую (интерактивный запрос)
      - critical-path: тикет блокирует другие (его готовность открывает фронтир);
                       ускорять самый блокирующий, не любой
      - iteration-heavy: много последовательных шагов (red-green цикл) — быстрота
                         за итерацию складывается
    not_when: параллельный веер независимых тикетов — лид ждёт самого медленного,
              ускорение одного ничего не даёт
    # Правило: среди ДОСТАТОЧНЫХ по качеству лейнов для тикета выбрать самый быстрый
    # (grok-4.5) вместо дорогого Codex-ultra. Тайбрейк по скорости, НЕ понижение
    # мощности: судейский/трудный тикет остаётся у сильной модели, даже если Grok
    # быстрее. Гейт трёх линз не трогается — срочность влияет на выбор исполнителя,
    # не на глубину проверки.
    tiebreak_prefer: grok-build
    over: [codex-code-ultra]

# -----------------------------------------------------------------------------
# Замены при НЕДОСТУПНОСТИ модели (SKILL.md Step 2, «Availability fallbacks»).
#
# Недоступность — кончилось окно лимитов, не оплачена подписка, коннектор
# отсутствует/разлогинен, поверхность отвечает ошибкой — это НЕ провал качества:
# попытки лестницы эскалации (routing.escalation) она не расходует, и вердикт
# тикета от неё не портится. Правило направления: замена никогда не опускается
# ниже пола качества класса — только «вбок» (равный тир другого провайдера)
# или «вверх» (дороже, но не хуже).
#
# Чтение цепочки: первый ДОСТУПНЫЙ элемент выигрывает; последний элемент —
# терминальное поведение, когда недоступно всё:
#   report-blocker  — честный блокер-отчёт пользователю (работа не имитируется)
#   lead-inline     — лид делает подзадачу сам, в главном цикле
#   skip-third-lens — легитимен только для опциональной ad hoc консультации вне гейта
#                     (Two surfaces, cross-provider.md); гейт-обязательную ось пропустить
#                     нельзя — для неё см. sonnet-inline-note ниже
#   sonnet-inline-note — v12 (срез 4, issue #8): для гейт-обязательных осей (Standards)
#                     пропуска нет — терминал исполняет ось Claude-моделью (sonnet)
#                     инлайн в главном цикле, с пометкой в финальном отчёте
# Каждый сработавший рерут штампуется в телеметрию полями fallback_from /
# fallback_reason (quality.md §7).
# -----------------------------------------------------------------------------
availability:
  fallbacks:
    # Claude-агенты (недоступность тира Claude):
    architect: [fable, opus, report-blocker]            # judgment-пол — Opus; ниже нельзя
    critic:    [opus, fable, report-blocker]            # первичный грейдер — всегда Claude:
                                                        # внешней моделью НЕ заменяется
    builder:   [sonnet, codex-code, opus, lead-inline]  # вбок на Terra, затем вверх
    scout:     [haiku, gemini-recon-cheap, sonnet, lead-inline]
                                                        # вбок на Flash Low — только если материал
                                                        # инлайнится/стейджится; иначе сразу вверх
    # Кросс-провайдерные лейны (недоступность внешней поверхности):
    codex-critic:      [codex-critic, gemini-critic, skip-third-lens]
    gemini-critic:     [gemini-critic, codex-critic, skip-third-lens]
    codex-code:        [codex-code, builder]
    codex-recon:       [codex-recon, builder]           # нужен shell -> builder, не scout
    gemini-recon:      [gemini-recon, codex-recon, builder]
    gemini-recon-cheap: [gemini-recon-cheap, scout]
    # Ось Standards фиксированного гейта (v12, срез 4, issue #8) — не лейн, а гейт-
    # обязательная ось: отдельная от пары выше, потому что та обслуживает опциональный
    # ad hoc второе мнение (легитимно завершается skip-third-lens), а эта — постоянный
    # член гейта (gates.lenses.standards, cross_provider.defaults.standards_lens) и
    # пропущена быть не может. Терминал sonnet-inline-note — см. словарь терминалов выше.
    standards-lens:    [codex-critic, gemini-critic, sonnet-inline-note]

  # Словарь причин для fallback_reason (телеметрия):
  reasons: [quota-window, subscription, connector-absent, connector-error]

# -----------------------------------------------------------------------------
# Пороги перекалибровки (quality.md §5, §7). Начальные догадки — правь по данным.
# -----------------------------------------------------------------------------
thresholds:
  first_try_pass_min: 0.80         # ниже — тикеты недоспецифицированы: чини тикеты, не воркеров
  recalibrate_after_records_per_tier: 20   # накопил тир столько записей -> ревизия рубрики
  critic_fail_rate_review_below: 0.05      # стабильно ниже — гейт, возможно, переприменяется
  incident_review_signal: 2        # >= N инцидентов одного класса -> сигнал ревизии правила (§8)

# -----------------------------------------------------------------------------
# Бюджет прогона (v15; вынесен из candidates ниже). Верхний контур поверх
# пер-тикетных ограничителей (review_loop.full_rounds_max, proportionality_stop,
# gates.pre_gate.max_diff_lines): те держат петли внутри тикета, этот — прогон
# целиком. Родился из того же инцидента 2026-07-17: ночь без внешнего бюджета
# дала циклу крутиться до 4х объёма всего сделанного ранее.
# -----------------------------------------------------------------------------
session_budget:
  # Кумулятивные токены прогона по записям §7 (input+output всех делегированных
  # тикетов и линз); лид сверяет сумму на каждой точке диспетча — механически,
  # без отдельного инструмента. Начальная догадка — правь по данным (§5).
  tokens_max: 3000000
  # При пересечении: новые тикеты не диспетчатся; уже летящие доводятся до своих
  # гейтов; остаток фронтира — в финальный отчёт как несделанное, с состоянием
  # трекера, чтобы свежий прогон продолжил с места остановки. Переопределение —
  # именованное решение лида с причиной в телеметрии, никогда молча.
  on_exceed: stop-dispatch-finish-gates-report

# -----------------------------------------------------------------------------
# Телеметрия (quality.md §7).
# -----------------------------------------------------------------------------
telemetry:
  log: telemetry/routing-log.jsonl
  stamp_records_with_config: true  # поле config: "v<version>+<sha256:7>" в каждой записи
  snapshot_dir: telemetry/config-snapshots

# -----------------------------------------------------------------------------
# Кандидаты на будущие ручки — пока живут в прозе или не параметризованы вовсе.
# Раздел — карта того, что ЕЩЁ можно вынести сюда; вынос кандидата = бамп version
# + правка соответствующей прозы (значение из прозы убирается, остаётся ссылка).
# -----------------------------------------------------------------------------
# candidates:
#   grill_depth_matrix:     таблица «тир x неоднозначность» глубины грилла (Step 0.5)
#   approval_checkpoint:    условия чекпойнта одобрения плана до первой волны (Step 1)
#   effort_per_class:       reasoning-эффорт воркеров по классам тикетов (сейчас — во
#                           фронтматтере агентов и пинах лейнов; сводная ручка возможна)
#   scout_two_angle:        обязательность двух ракурсов инвентаризации (v2.11 — сейчас
#                           правило прозы delegation.md; можно сделать переключаемым)
#   team_channel:           триггеры/лимиты экспериментального канала teams (teams.md;
#                           пока под флагом окружения и собственным пилотом)
#   verdict_vocabulary:     словарь вердиктов телеметрии (quality.md §7) — сознательно
#                           НЕ ручка: словарь должен быть стабильным, чтобы записи
#                           разных недель оставались сравнимыми
