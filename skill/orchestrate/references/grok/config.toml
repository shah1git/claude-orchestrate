# Референс ~/.grok/config.toml для Grok-лейнов /orchestrate: минимум egress.
# Основание — аудит grok-build 2026-07-18 (память: grok-build-audit.md).
# Устанавливается в ~/.grok/config.toml скриптом bootstrap-mac.sh, ЕСЛИ файла
# ещё нет (иначе — предупреждение «слить вручную», чтобы не затереть твои ключи).
#
# Почему каждый ключ: механизм выгрузки в GCS xAI жив в коде и по умолчанию
# выключен, НО удалённые настройки сервера идут раньше дефолта — xAI может
# включить телеметрию/выгрузку удалённо. Локальные выключатели ниже перебивают
# удалённые. Список исключений выгрузки НЕ содержит .ssh/*.pem/.env — потому
# выключаем канал целиком, а не полагаемся на skip-лист.

[features]
telemetry = false            # локальный off бьёт remote settings xAI
codebase_indexing = false    # code-nav не нужен headless-лейну

[telemetry]
trace_upload = false         # пояс к подтяжкам: GCS-выгрузка off, даже если telemetry включат

[diagnostics]
error_reporting = false      # Sentry off

[cli]
auto_update = false           # не тянуть неаудированные бинарники поверх пина

[sandbox]
# ВАЖНО (исправлено 2026-07-24): здесь НЕ ставим profile = "orchestrate".
# Этот файл — ГЛОБАЛЬНЫЙ ~/.grok/config.toml, его читает КАЖДЫЙ запуск grok на
# машине, в том числе интерактивная работа владельца. Прежняя строка
# profile = "orchestrate" сажала в песочницу и её тоже — grok владельца переставал
# видеть ~/projects, git, .env и не давал сделать push. Это была ошибка: защиту
# оркестратора глобально форсить НЕ нужно.
# Лейн оркестрации сажает себя в песочницу САМ, при каждом запуске: run_lane
# передаёт grok флаг `--sandbox orchestrate` и env GROK_SANDBOX=orchestrate
# (tools/run_lane/adapters.py + hardening.py), а сам профиль определён в
# sandbox.toml рядом. Плюс fail-closed гейт: если песочница вдруг не применилась,
# лейн не примет результат (hardening.gate ищет ProfileApplied). То есть строка
# ниже лейну не нужна — она была только помехой владельцу.
# Такое же правило уже действует у kimi: ужесточение — на спавнере лейна, не
# глобально (references/kimi/config.toml).
profile = "off"              # глобальный дефолт — БЕЗ песочницы; интерактивный grok
                             # владельца свободен. Лейн включает orchestrate сам, флагом.
auto_allow_bash = true       # без permission-промптов в headless; действует ТОЛЬКО
                             # когда песочница реально применена — то есть у лейна
                             # (он форсит orchestrate флагом), а не у интерактива.
