# Референс глобального ужесточения ~/.kimi-code/config.toml (Kimi Code CLI).
# В отличие от Grok, живой файл здесь целиком НЕ заменяется: его создаёт логин
# и в нём лежат ключи владельца. Поэтому bootstrap-mac.sh не копирует этот
# образец, а ВЛИВАЕТ единственный безопасный ключ (telemetry) в корень TOML
# существующего конфига, не трогая остального. Образец — для ручной сверки.
# Обоснование каждой ручки — README.md рядом (егресс-аудит 2026-07-18).

# Поведенческая телеметрия (telemetry-logs.kimi.com): уходят метаданные, но с
# OAuth-токеном => события связываемы с аккаунтом. Off — без потери функций.
telemetry = false

# Остальные ручки аудита (auto-update, cron) глобального конфиг-ключа по аудиту
# не имеют и глобально НЕ форсятся — их лейн передаёт через env при спавне
# (KIMI_DISABLE_TELEMETRY=1, KIMI_CODE_NO_AUTO_UPDATE=1, KIMI_DISABLE_CRON=1),
# не задевая интерактивные сессии владельца в omp/нативном CLI.
#
# Опционально, осознанное решение владельца (НЕ применено по умолчанию):
# удалить [services.moonshot_search] / [services.moonshot_fetch], чтобы поиск и
# загрузка URL не шли через бекенд Moonshot; секции восстанавливаются при каждом
# re-login — правку пришлось бы повторять. Подробности — README.md.
